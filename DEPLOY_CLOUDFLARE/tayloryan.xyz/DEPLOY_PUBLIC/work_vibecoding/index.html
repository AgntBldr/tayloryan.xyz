<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibecoding | Taylor Ryan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #000;
            color: #fff;
        }

        /* Modal Styles */
        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-black min-h-screen">
    <!-- Sidebar (Injected) -->
    <div id="sidebar-container"></div>

    <main class="md:ml-72 transition-all duration-300 pt-32 pb-20 max-w-7xl mx-auto px-6">

        <!-- Header -->
        <div class="mb-16">
            <span class="text-orange-400 font-bold tracking-widest uppercase text-sm mb-4 block">Work Portfolio</span>
            <h1 class="text-5xl md:text-7xl font-extrabold text-white mb-6">Vibecoding</h1>
            <p class="text-neutral-400 text-xl max-w-3xl leading-relaxed">
                Automated agents and AI workflows.
            </p>
        </div>

        <!-- Section: Vibecoding -->
        <section class="mb-32">
            <div id="vibecoding-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Projects injected via JS -->
                <div class="col-span-full text-center text-neutral-500 py-12">Loading Projects...</div>
            </div>
        </section>

    </main>

    <!-- Modal -->
    <div id="project-modal"
        class="fixed inset-0 z-50 hidden modal-overlay flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-neutral-900 border border-neutral-700 rounded-2xl w-full max-w-5xl max-h-[90vh] overflow-y-auto relative shadow-2xl transform scale-95 transition-transform duration-300 scrollbar-hide"
            id="modal-content">
            <button onclick="closeModal()"
                class="absolute top-4 right-4 p-2 bg-neutral-800 rounded-full hover:bg-neutral-700 transition-colors z-20 group">
                <i data-lucide="x" class="w-6 h-6 text-neutral-400 group-hover:text-white"></i>
            </button>
            <div id="modal-body" class="p-8 md:p-12">
                <!-- Content injected via JS -->
            </div>
        </div>
    </div>

    <!-- Data & Scripts -->
    <script src="/assets/js/layout.js?v=20260203-0901"></script>
    <script src="/assets/js/work_sidebar.js?v=20260203-0901"></script>
    <script src="/assets/js/projects_data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderWorkSidebar('vibecoding');
            renderProjects();
            lucide.createIcons();
        });

        function renderProjects() {
            const grid = document.getElementById('vibecoding-grid');
            if (typeof PROJECTS_DATA === 'undefined') {
                grid.innerHTML = '<div class="col-span-full text-red-500">Error: Projects Data not loaded.</div>';
                return;
            }

            grid.innerHTML = PROJECTS_DATA.map(p => `
                <div class="bg-neutral-900 border border-neutral-800 rounded-2xl overflow-hidden hover:border-orange-500/50 transition-all cursor-pointer group h-full flex flex-col" onclick="openModal('${p.id}')">
                    
                    ${p.image ? `
                    <div class="h-48 w-full overflow-hidden relative border-b border-white/5">
                         <img src="${p.image}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                         <div class="absolute inset-0 bg-gradient-to-t from-neutral-900 via-transparent to-transparent opacity-60"></div>
                         
                         <div class="absolute top-4 right-4 z-10">
                            <span class="px-2 py-1 bg-black/60 backdrop-blur text-white text-[10px] font-bold uppercase tracking-wider border border-white/10 rounded">${p.environment}</span>
                         </div>
                    </div>
                    ` : ''}

                    <div class="p-8 flex-1 flex flex-col relative">
                        ${!p.image ? `
                        <div class="flex justify-between items-start mb-6">
                            <span class="px-3 py-1 bg-orange-500/10 text-orange-400 rounded text-xs font-bold uppercase tracking-wider border border-orange-500/20">${p.type}</span>
                            <div class="px-3 py-1 bg-neutral-800 text-neutral-400 text-xs font-mono rounded">${p.environment}</div>
                        </div>
                        ` : ''}

                        ${p.tags ? `
                        <div class="flex flex-wrap gap-2 mb-4">
                            ${p.tags.map(tag => `<span class="px-2 py-1 bg-neutral-800 text-neutral-300 text-[10px] font-bold uppercase tracking-wider rounded border border-neutral-700">${tag}</span>`).join('')}
                        </div>
                        ` : ''}
                        
                        <div class="flex items-center gap-3 mb-3">
                             <h3 class="text-2xl font-bold text-white group-hover:text-orange-400 transition-colors leading-tight">${p.project}</h3>
                        </div>

                        <p class="text-neutral-400 mb-6 leading-relaxed line-clamp-3 text-sm">${p.description}</p>
                        
                        <div class="mt-auto grid grid-cols-1 gap-3 text-xs bg-black/30 p-4 rounded-xl border border-white/5">
                            ${p.tech_stack ? `
                            <div>
                                <span class="block text-neutral-500 mb-1 uppercase tracking-wider font-bold">Stack</span>
                                <span class="text-neutral-300 line-clamp-1">${p.tech_stack}</span>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `).join('');

            lucide.createIcons();
        }

        function openModal(id) {
            const item = PROJECTS_DATA.find(p => p.id === id);
            if (!item) return;

            const modal = document.getElementById('project-modal');
            const content = document.getElementById('modal-content');
            const body = document.getElementById('modal-body');

            // Prevent scroll
            document.body.style.overflow = 'hidden';

            // --- PROJECT MODAL CONTENT ---
            body.innerHTML = `
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                <!-- Left Column: Visuals & Context -->
                <div class="space-y-8">
                    ${item.image ? `
                    <div class="rounded-xl overflow-hidden border border-neutral-700 shadow-2xl relative group">
                        <img src="${item.image}" class="w-full h-auto object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                        <div class="absolute bottom-4 left-4">
                            <span class="bg-black/80 backdrop-blur text-white text-xs px-2 py-1 rounded border border-white/10 font-mono">
                                ${item.image.split('/').pop()}
                            </span>
                        </div>
                    </div>
                    ` : ''}

                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-neutral-800/30 p-4 rounded-xl border border-neutral-700">
                            <span class="block text-xs text-neutral-500 uppercase tracking-wider mb-2">Environment</span>
                            <div class="font-mono text-orange-400 font-bold">${item.environment}</div>
                        </div>
                        <div class="bg-neutral-800/30 p-4 rounded-xl border border-neutral-700">
                            <span class="block text-xs text-neutral-500 uppercase tracking-wider mb-2">Type</span>
                            <div class="font-bold text-white">${item.type}</div>
                        </div>
                    </div>

                    ${item.tech_stack ? `
                    <div class="bg-neutral-800/30 p-6 rounded-xl border border-neutral-700">
                        <h4 class="text-white font-bold mb-4 flex items-center gap-2">
                            <i data-lucide="layers" class="w-5 h-5 text-blue-400"></i> Tech Stack
                        </h4>
                        <div class="flex flex-wrap gap-2">
                            ${item.tech_stack.split(',').map(t => `
                                <span class="px-3 py-1 bg-neutral-800 border border-neutral-600 rounded-full text-sm text-neutral-300 hover:text-white hover:border-neutral-500 transition-colors cursor-default">${t.trim()}</span>
                            `).join('')}
                        </div>
                    </div>
                    ` : ''}
                </div>

                <!-- Right Column: Details -->
                <div class="space-y-8">
                    <div>
                        <h2 class="text-4xl font-extrabold text-white mb-4">${item.project}</h2>
                        <p class="text-neutral-300 text-lg leading-relaxed">${item.description}</p>
                    </div>

                    <!-- Vibecode Prompt -->
                        ${item.vibecode_prompt ? `
                    <div class="bg-gradient-to-r from-purple-900/20 to-blue-900/20 p-6 rounded-xl border border-purple-500/20">
                        <h4 class="text-purple-400 font-bold mb-2 flex items-center gap-2">
                            <i data-lucide="sparkles" class="w-5 h-5"></i> Vibecode Prompt
                        </h4>
                        <p class="text-white italic font-serif leading-relaxed opacity-90">"${item.vibecode_prompt}"</p>
                    </div>
                    ` : ''}

                    <!-- Inputs / Outputs Grid -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        ${item.inputs ? `
                        <div>
                            <h4 class="text-sm font-bold text-neutral-500 uppercase tracking-widest mb-3">Inputs</h4>
                            <p class="text-neutral-300 text-sm leading-relaxed">${item.inputs}</p>
                        </div>
                        ` : ''}
                        ${item.output ? `
                        <div>
                            <h4 class="text-sm font-bold text-neutral-500 uppercase tracking-widest mb-3">Outputs</h4>
                            <p class="text-neutral-300 text-sm leading-relaxed">${item.output}</p>
                        </div>
                        ` : ''}
                    </div>

                    <!-- What It Proves -->
                        ${item.what_it_proves ? `
                    <div class="border-t border-neutral-800 pt-6">
                        <h4 class="text-sm font-bold text-green-500 uppercase tracking-widest mb-3 flex items-center gap-2">
                            <i data-lucide="check-circle-2" class="w-4 h-4"></i> What It Proves
                        </h4>
                        <p class="text-neutral-300 leading-relaxed">${item.what_it_proves}</p>
                    </div>
                    ` : ''}

                    <!-- Links -->
                    <div class="flex flex-wrap gap-4 mt-8 pt-8 border-t border-neutral-800">
                        ${item.github ? `
                        <a href="${item.github}" target="_blank" class="flex items-center gap-2 px-6 py-3 bg-neutral-800 hover:bg-neutral-700 text-white font-bold rounded-xl transition-colors border border-neutral-700">
                            <i data-lucide="github" class="w-5 h-5"></i> GitHub
                        </a>
                        ` : ''}
                        ${item.url ? `
                        <a href="${item.url}" target="_blank" class="flex items-center gap-2 px-6 py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl transition-colors shadow-lg shadow-blue-900/20">
                            <i data-lucide="bot" class="w-5 h-5"></i> AI Studio
                        </a>
                        ` : ''}
                    </div>
                </div>
            </div>
            `;

            modal.classList.remove('hidden');
            // Force Reflow
            void modal.offsetWidth;

            modal.classList.remove('opacity-0');
            content.classList.remove('scale-95');
            content.classList.add('scale-100');

            lucide.createIcons();
        }

        function closeModal() {
            const modal = document.getElementById('project-modal');
            const content = document.getElementById('modal-content');

            modal.classList.add('opacity-0');
            content.classList.remove('scale-100');
            content.classList.add('scale-95');

            setTimeout(() => {
                modal.classList.add('hidden');
                document.body.style.overflow = '';
            }, 300);
        }
    </script>
</body>

</html>
