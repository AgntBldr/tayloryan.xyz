<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorials | Taylor Ryan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="/assets/data_tutorials.js"></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #000;
            color: #fff;
        }
    </style>
    <link rel="canonical" href="https://taylorryan.xyz/work_tutorials/">
    <meta property="og:url" content="https://taylorryan.xyz/work_tutorials/">
</head>

<body class="bg-black min-h-screen">
    <script src="/assets/js/layout.js"></script>

    <main class="pt-32 pb-20 max-w-7xl mx-auto px-6">

        <!-- Header -->
        <div class="mb-16">
            <span class="text-red-500 font-bold tracking-widest uppercase text-sm mb-4 block">Work Portfolio</span>
            <h1 class="text-5xl md:text-7xl font-extrabold text-white mb-6">Video Tutorials</h1>
            <p class="text-neutral-400 text-xl max-w-3xl leading-relaxed">
                Step-by-step guides, node setups, and technical walkthroughs.
            </p>
        </div>

        <!-- Grid -->
        <div id="tutorials-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Injected via JS -->
        </div>

    </main>


    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof TUTORIALS_DATA === 'undefined') {
                document.getElementById('tutorials-grid').innerHTML = '<p class="text-neutral-500">No data found.</p>';
                return;
            }

            renderTutorials(TUTORIALS_DATA);
        });

        function renderTutorials(data) {
            const container = document.getElementById('tutorials-grid');
            if (data.length === 0) {
                container.innerHTML = '<p class="text-neutral-500 col-span-3 text-center py-20">No tutorials found.</p>';
                return;
            }

            container.innerHTML = data.map(item => {
                // Formatting helpful snippets
                const descSnippet = item.description.length > 120 ? item.description.substring(0, 120) + '...' : item.description;

                return `
                <a href="${item.url}" target="_blank" class="group flex flex-col bg-neutral-900 border border-neutral-800 hover:border-red-500/50 rounded-2xl overflow-hidden transition-all hover:-translate-y-1">
                    
                    <!-- Video Placeholder / Thumbnail Area -->
                    <div class="h-48 bg-neutral-800 flex items-center justify-center relative overflow-hidden group-hover:opacity-90 transition-opacity">
                         <i data-lucide="play-circle" class="w-16 h-16 text-neutral-700/50 group-hover:text-red-500 transition-colors z-10"></i>
                         <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
                         
                         <!-- Try to use Youtube thumbnail if standard YT url -->
                         ${item.url.includes('youtube.com') || item.url.includes('youtu.be') ?
                        `<img src="https://img.youtube.com/vi/${getYoutubeId(item.url)}/hqdefault.jpg" class="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:opacity-80 transition-opacity" />`
                        : ''}

                         <div class="absolute bottom-3 right-3 bg-black/80 px-2 py-1 rounded text-xs font-bold text-white flex items-center gap-1">
                            <i data-lucide="clock" class="w-3 h-3"></i> ${item.length}
                         </div>
                    </div>

                    <div class="p-6 flex-1 flex flex-col">
                        <div class="flex justify-between items-start mb-3">
                             <span class="text-xs font-bold text-red-400 uppercase tracking-wider">${item.project || 'Tutorial'}</span>
                             <span class="text-xs text-neutral-600 font-mono">${item.date}</span>
                        </div>
                        
                        <h3 class="text-xl font-bold text-white mb-3 group-hover:text-red-500 transition-colors line-clamp-2">${item.title}</h3>
                        <p class="text-sm text-neutral-400 line-clamp-3 mb-4 flex-1">${descSnippet}</p>
                        
                        <div class="mt-auto pt-4 border-t border-neutral-800 flex items-center gap-2 text-sm text-neutral-500 group-hover:text-white transition-colors">
                            <span>Watch Video</span>
                            <i data-lucide="arrow-right" class="w-4 h-4"></i>
                        </div>
                    </div>
                </a>
                `;
            }).join('');

            lucide.createIcons();
        }

        function getYoutubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }
    </script>
</body>

</html>
