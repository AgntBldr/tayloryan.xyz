<!DOCTYPE html>
<html lang="en">

<head>

        rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #000;
            color: #fff;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-black min-h-screen flex flex-col">
    <script src="../../assets/js/layout.js?v=20260130-2117"></script>
    <!-- Data Source -->
    <script src="../../assets/js/marketing_full_data.js"></script>
    <!-- Sidebar -->
    <script src="../../assets/js/marketing_sidebar.js?v=20260130-2117"></script>
    <script src="../../assets/js/social_media_data.js"></script>
    <script>
        // Merge Social Media Data into Marketing Full Data on the fly
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof SOCIAL_MEDIA_DATA !== 'undefined' && typeof MARKETING_FULL_DATA !== 'undefined') {
                const mappedSocial = SOCIAL_MEDIA_DATA.map(item => ({
                    title: item.resource,
                    description: item.description,
                    url: (item.url && typeof item.url === 'string' && item.url.startsWith('http')) ? item.url : null,
                    category: item.category, // Content Strategy, Content Creation, Content Publishing
                    type: item.type
                }));
                // Prepend or concat? Concat is fine.
                MARKETING_FULL_DATA = MARKETING_FULL_DATA.concat(mappedSocial);
            }
        });
    </script>

    <div class="flex-1 flex pt-20 h-screen overflow-hidden">

        <!-- Sidebar Container (Rendered by JS) -->
        <div id="sidebar-container"></div>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto relative bg-neutral-950/50 md:ml-64">

            <!-- Mobile Header -->
            <div
                class="md:hidden flex items-center justify-between p-4 border-b border-white/10 bg-black/80 backdrop-blur sticky top-0 z-20">
                <span class="font-bold text-white">Marketing Hub</span>
                <button
                    onclick="document.querySelector('aside').classList.toggle('hidden'); document.querySelector('aside').classList.toggle('absolute'); document.querySelector('aside').classList.toggle('z-50'); document.querySelector('aside').classList.toggle('h-full');"
                    class="p-2 text-white">
                    <i data-lucide="menu"></i>
                </button>
            </div>

            <!-- Content Area -->
            <div class="p-6 md:p-12 max-w-7xl mx-auto pb-32">

                <!-- Page Header -->
                <div class="mb-16 animate-fade-in">
                    <span class="text-green-500 font-bold tracking-widest uppercase text-sm mb-4 block">Project
                        Center</span>
                    <h1 class="text-5xl md:text-6xl font-extrabold text-white mb-6">Marketing Hub</h1>
                    <p class="text-neutral-400 text-xl max-w-3xl leading-relaxed">
                        Strategic growth initiatives driving revenue through content, outreach, and partnerships.
                    </p>
                </div>

                <!-- Sections Container -->
                <div id="sections-container" class="space-y-32">
                    <!-- Injected via JS -->
                </div>

            </div>

        </main>
    </div>

    <script>
        // Metadata for each section
        // Matches the structure of work_projects.html
        const SECTIONS = [
            {
                id: 'content-creator',
                title: 'Content Creator Program',
                description: 'Scalable recruitment and enablement system for brand advocates.',
                url: 'content_creator.html',
                category: 'Content Creator', // Matches marketing_full_data.js
                icon: 'users',
                color: 'text-purple-400',
                borderColor: 'hover:border-purple-500/50',
                bgTint: 'bg-purple-500/10'
            },
            {
                id: 'email-outreach',
                title: 'Outbound Email Campaigns',
                description: 'High-volume, automated cold email infrastructure and templates.',
                url: 'email_outreach.html',
                category: 'Email Outreach', // Note: Check data for exact match
                icon: 'mail',
                color: 'text-blue-400',
                borderColor: 'hover:border-blue-500/50',
                bgTint: 'bg-blue-500/10'
            },
            {
                id: 'social-media',
                title: 'Social Media',
                description: 'Content strategy, creation, and publishing workflows.',
                url: 'social_media/index.html',
                category: 'Content Strategy', // Matches social_media_data.js or general category
                icon: 'share-2',
                color: 'text-cyan-400',
                borderColor: 'hover:border-cyan-500/50',
                bgTint: 'bg-cyan-500/10'
            },
            {
                id: 'affiliates',
                title: 'Affiliate Program',
                description: 'Partner network management and commission structures.',
                url: 'affiliates.html',
                category: 'Affiliates', // Note: Check data
                icon: 'share-2',
                color: 'text-orange-400',
                borderColor: 'hover:border-orange-500/50',
                bgTint: 'bg-orange-500/10'
            },
            {
                id: 'case-studies',
                title: 'Case Study Creation',
                description: 'Proof-of-value documentation and customer success stories.',
                url: 'case_studies.html',
                category: 'Case Studies',
                icon: 'file-text',
                color: 'text-yellow-400',
                borderColor: 'hover:border-yellow-500/50',
                bgTint: 'bg-yellow-500/10'
            },
            {
                id: 'testimonials',
                title: 'Testimonial Creation',
                description: 'Social proof aggregation and formatting.',
                url: 'testimonials.html',
                category: 'Testimonials',
                icon: 'message-square-quote',
                color: 'text-pink-400',
                borderColor: 'hover:border-pink-500/50',
                bgTint: 'bg-pink-500/10'
            }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            // Render Sidebar
            if (typeof renderMarketingSidebar === 'function') {
                renderMarketingSidebar('overview');
                // Move sidebar into container if needed, or sidebar script appends to body?
                // marketing_sidebar.js?v=20260130-2117 usually document.write or appends. 
                // Let's assume it appends to where it's called or we handle it.
                // Actually, marketing_sidebar.js?v=20260130-2117 returns HTMLString? 
                // Wait, let's check marketing_sidebar.js?v=20260130-2117 content again.
                // It returns a generic valid sidebar string? 
                // Step 2436: `const sidebarHTML = ...` is defined but NOT returned or appended!
                // It just defines `sidebarHTML` string?
                // WAIT. The script in Step 2436 ENDS at line 129. It does NOT do document.body.innerHTML += ... 
                // It seems to expect the caller to use `sidebarHTML`?
                // Re-reading Step 2436:
                // It defines `renderMarketingSidebar(activePage)`.
                // It calculates `sidebarHTML`.
                // It DOES NOT inject it.

                // Correction: I need to FIX marketing_sidebar.js?v=20260130-2117 or use the return value.
                // Let's look at `portfolio/marketing/index.html` (Original).
                // It had the sidebar INLINED.

                // The `marketing_sidebar.js?v=20260130-2117` I saw in Step 2436 (which I thought was being used) might be a 'work in progress' or used differently?
                // Ah, Step 2436 code:
                // `renderMarketingSidebar` function body...
                // It ends with: `span id="sidebar-resource-count">${totalResources}</span>...`
                // It does NOT return `sidebarHTML` or inject it.
                // It assigns it to a variable `sidebarHTML`.
                // AND THEN? 
                // The snippets shown end at line 100.
                // I need to see the END of `marketing_sidebar.js?v=20260130-2117`.

            }

            lucide.createIcons();
            renderSections();
        });

        function renderSections() {
            const container = document.getElementById('sections-container');
            if (typeof MARKETING_FULL_DATA === 'undefined') {
                container.innerHTML = '<div class="text-red-500">Error: Data not loaded</div>';
                return;
            }

            container.innerHTML = SECTIONS.map(section => {
                // Get all items for this category to count them
                const allItems = MARKETING_FULL_DATA.filter(item =>
                    item.category === section.category ||
                    (section.id === 'social-media' && ['Content Strategy', 'Content Creation', 'Content Publishing'].includes(item.category)) ||
                    (section.category === 'Email Outreach' && item.category === 'Email') // Fallback if categories vary
                );

                const totalCount = allItems.length;
                const items = allItems.slice(0, 3); // Top 3

                return `
                    <section>
                        <div class="flex flex-col md:flex-row md:items-end justify-between mb-8 gap-4">
                            <div>
                                <h2 class="text-3xl font-bold text-white flex items-center gap-3 mb-3">
                                    <a href="${section.url}" class="flex items-center gap-3 hover:${section.color.replace('text-', 'text-')} transition-colors">
                                        <i data-lucide="${section.icon}" class="${section.color}"></i> ${section.title}
                                    </a>
                                </h2>
                                <p class="text-neutral-400 max-w-2xl text-sm leading-relaxed">
                                    ${section.description}
                                </p>
                            </div>
                            <div class="shrink-0">
                                <a href="${section.url}" 
                                    class="px-4 py-2 bg-neutral-900 border border-neutral-800 rounded-xl text-sm font-bold text-neutral-400 hover:text-white hover:border-${section.color.split('-')[1]}-500 transition-all block text-center">
                                    See All Projects (${totalCount})
                                </a>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${items.length > 0 ? items.map(item => `
                                <div class="bg-neutral-900 border border-white/5 p-6 rounded-xl hover:border-white/20 transition-all group flex flex-col relative h-full">
                                    <!-- External Link Icon -->
                                    <div class="absolute top-4 right-4 opacity-0 group-hover:opacity-100 transition-opacity">
                                        <a href="${item.url || '#'}" target="_blank" class="p-2 bg-neutral-800 rounded-lg text-white hover:bg-neutral-700 transition-colors block">
                                            <i data-lucide="external-link" class="w-4 h-4"></i>
                                        </a>
                                    </div>
                                    
                                    <div class="mb-4">
                                        <span class="px-2 py-1 bg-white/5 text-neutral-400 rounded text-[10px] font-bold uppercase tracking-wider border border-white/5">${item.type || 'Resource'}</span>
                                    </div>

                                    <h3 class="text-lg font-bold text-white mb-2 pr-8 leading-tight group-hover:${section.color} transition-colors">
                                        ${item.title}
                                    </h3>
                                    <p class="text-neutral-400 text-sm mb-4 line-clamp-3 flex-1">
                                        ${item.description}
                                    </p>
                                    
                                    ${item.url ? `
                                    <div class="mt-auto pt-4 border-t border-white/5">
                                        <a href="${item.url}" target="_blank" class="text-xs font-bold ${section.color} hover:text-white transition-colors flex items-center gap-2">
                                            Open Resource <i data-lucide="arrow-right" class="w-3 h-3"></i>
                                        </a>
                                    </div>
                                    ` : ''}
                                </div>
                            `).join('') : `
                                <div class="col-span-full py-8 text-center bg-neutral-900/30 rounded-xl border border-dashed border-neutral-800 text-neutral-500 text-sm">
                                    No featured resources yet.
                                </div>
                            `}
                        </div>
                    </section>
                `;
            }).join('');

            lucide.createIcons();
        }
    </script>
</body>

</html>
