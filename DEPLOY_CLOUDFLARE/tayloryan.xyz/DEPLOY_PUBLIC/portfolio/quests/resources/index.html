<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resources | Taylor's Quest Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/assets/resources_data.js"></script>
    <script src="/assets/js/quests_data.js"></script>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        /* Modal Styles */
        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
        }
    </style>
    <link rel="canonical" href="https://taylorryan.xyz/portfolio/quests/resources/">
    <meta property="og:url" content="https://taylorryan.xyz/portfolio/quests/resources/">
</head>

<body class="min-h-screen p-6 md:p-12 relative md:pl-72">
    <!-- Global Layout -->
    <script src="/assets/js/layout.js?v=20260202-1339"></script>
    <script src="/assets/js/work_sidebar.js?v=20260202-1339"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof renderWorkSidebar === 'function') renderWorkSidebar('quests');
        });
    </script>

    <!-- Header -->
    <header class="mb-12 text-center relative z-10 flex flex-col items-center mt-24">
        <h1
            class="text-5xl font-bold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-purple-500 to-pink-500">
            Quest Portfolio
        </h1>
        <p class="text-neutral-400 max-w-2xl mx-auto text-lg mb-8">
            Discover 40+ on-chain activations and growth campaigns designed to drive engagement.
        </p>

        <!-- View Toggle (Navigation) -->
        <div class="bg-neutral-900 border border-neutral-800 p-1 rounded-full flex gap-1 relative z-20">
            <a href="/portfolio/quests/"
                class="px-6 py-2 rounded-full text-sm font-bold text-neutral-500 hover:text-white transition-all">Portfolio</a>
            <a href="/portfolio/quests/overview/"
                class="px-6 py-2 rounded-full text-sm font-bold text-neutral-500 hover:text-white transition-all">Overview</a>
            <a href="/portfolio/quests/analytics/"
                class="px-6 py-2 rounded-full text-sm font-bold text-neutral-500 hover:text-white transition-all">Analytics</a>
            <a href="/portfolio/quests/resources/"
                class="px-6 py-2 rounded-full text-sm font-bold bg-neutral-800 text-white shadow-lg transition-all">Resources</a>
        </div>
    </header>

    <!-- CONTENT -->
    <div id="resources-view" class="w-full max-w-7xl mx-auto pb-12 transition-opacity duration-300 relative z-10">
        <!-- Breadcrumbs (Header for Grid) -->
        <div id="res-breadcrumbs" class="mb-8">
            <!-- Injected by JS -->
        </div>

        <!-- Main Content Area -->
        <div id="res-content-area">
            <!-- Content injected via JS -->
        </div>
    </div>

    <!-- Resource Modal (Matches email_outreach.html style) -->
    <div id="resource-modal" onclick="closeModal()"
        class="fixed inset-0 z-50 hidden modal-overlay flex items-center justify-center p-4">
        <div onclick="event.stopPropagation()"
            class="bg-neutral-900 border border-neutral-700 rounded-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto relative shadow-2xl transform scale-95 transition-transform duration-200"
            id="modal-content">

            <!-- Close Button -->
            <button onclick="closeModal()"
                class="absolute top-4 right-4 p-2 bg-neutral-800 rounded-full hover:bg-neutral-700 transition-colors z-20 group border border-white/5">
                <i data-lucide="x" class="w-5 h-5 text-neutral-400 group-hover:text-white"></i>
            </button>

            <!-- Header Banner -->
            <div class="bg-gradient-to-r from-blue-900/20 to-neutral-900 p-8 border-b border-white/5">
                <div class="flex items-start gap-4">
                    <div id="modal-icon-container"
                        class="p-4 bg-neutral-800 rounded-xl border border-white/10 text-blue-400 shadow-xl">
                        <!-- Icon injected -->
                        <i id="modal-icon" data-lucide="file-text" class="w-8 h-8"></i>
                    </div>
                    <div class="flex-1">
                        <div class="flex flex-wrap items-center gap-2 mb-3">
                            <span id="modal-resource-type"
                                class="px-2 py-1 bg-white/5 rounded text-[10px] font-bold text-neutral-400 uppercase tracking-wider border border-white/5">Resource</span>
                            <span id="modal-category-badge"
                                class="px-2 py-1 bg-blue-500/10 text-blue-400 rounded text-[10px] font-bold uppercase tracking-wider border border-blue-500/20">Category</span>
                        </div>
                        <h2 id="modal-title" class="text-2xl md:text-3xl font-bold text-white mb-2 leading-tight">
                            Resource Title</h2>
                        <div class="flex items-center gap-2 text-sm text-neutral-400">
                            <span class="w-1 h-1 rounded-full bg-neutral-600"></span>
                            <span id="modal-subtitle">Quest Portfolio</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Modal Body -->
            <div class="p-8">

                <h3 class="text-xs font-bold text-neutral-500 uppercase tracking-wider mb-2">Description</h3>
                <p id="modal-desc" class="text-neutral-300 text-base leading-relaxed mb-6 whitespace-pre-wrap">
                    Description goes here...</p>

                <!-- Metadata Grid -->
                <!-- Only show if data exists, handled by JS -->
                <div id="modal-meta-grid"
                    class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 bg-neutral-800/20 p-4 rounded-xl border border-white/5">
                    <div>
                        <span class="block text-[10px] font-bold text-neutral-500 uppercase mb-1">Type</span>
                        <div id="meta-type" class="text-sm font-semibold text-white">-</div>
                    </div>
                    <div>
                        <span class="block text-[10px] font-bold text-neutral-500 uppercase mb-1">Category</span>
                        <div id="meta-category" class="text-sm font-semibold text-white">-</div>
                    </div>
                    <div>
                        <span class="block text-[10px] font-bold text-neutral-500 uppercase mb-1">Access</span>
                        <div id="meta-access" class="text-sm font-semibold text-white">Full</div>
                    </div>
                    <div>
                        <span class="block text-[10px] font-bold text-neutral-500 uppercase mb-1">Cost</span>
                        <div id="meta-cost" class="text-sm font-semibold text-white">Free</div>
                    </div>
                </div>

                <!-- Dynamic Content (e.g. Sheets) -->
                <div id="modal-dynamic-content" class="mb-8">
                    <!-- Injected -->
                </div>

                <div
                    class="flex justify-between items-center pt-6 border-t border-white/10 sticky bottom-0 bg-neutral-900 pb-2">
                    <button onclick="closeModal()"
                        class="px-6 py-3 rounded-xl font-bold text-neutral-400 hover:text-white hover:bg-white/5 transition-all">Close</button>
                    <a id="modal-link" href="#" target="_blank"
                        class="px-8 py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl shadow-lg shadow-blue-900/20 transition-all flex items-center gap-2 group">
                        Open Resource <i data-lucide="external-link"
                            class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Deployment Timestamp: 2026-01-26 16:38 -->

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderResources();
            lucide.createIcons();
        });

        // Icon Mapping
        const RESOURCE_ICONS = {
            'Databases': { icon: 'database', color: 'text-blue-500', label: 'Data Source' },
            'Discovery': { icon: 'compass', color: 'text-purple-500', label: 'Research' },
            'Templates': { icon: 'layout-template', color: 'text-green-500', label: 'Blueprints' },
            'Tutorials': { icon: 'youtube', color: 'text-red-500', label: 'Video Guide' },
            'Legal': { icon: 'scale', color: 'text-yellow-500', label: 'Compliance' }
        };

        let currentView = 'card'; // 'card' or 'row'

        function renderResources() {
            const container = document.getElementById('res-content-area');
            const breadcrumbs = document.getElementById('res-breadcrumbs');

            // Reset Header/Toggle
            breadcrumbs.innerHTML = `
                <div class="flex items-center justify-between w-full border-b border-neutral-800 pb-4 mb-6">
                    <span class="text-white font-bold text-xl">Resources Library</span>
                    
                    <!-- View Toggle -->
                    <div class="flex items-center gap-2 bg-neutral-900 p-1 rounded-lg border border-neutral-800">
                        <button onclick="toggleView('card')" class="p-2 rounded-md transition-all ${currentView === 'card' ? 'bg-neutral-800 text-white shadow-sm' : 'text-neutral-500 hover:text-neutral-300'}">
                            <i data-lucide="layout-grid" class="w-4 h-4"></i>
                        </button>
                        <button onclick="toggleView('row')" class="p-2 rounded-md transition-all ${currentView === 'row' ? 'bg-neutral-800 text-white shadow-sm' : 'text-neutral-500 hover:text-neutral-300'}">
                            <i data-lucide="list" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            `;

            if (typeof RESOURCES_DB === 'undefined') {
                container.innerHTML = '<p class="text-center text-neutral-500">Loading resources...</p>';
                return;
            }

            const categories = Object.keys(RESOURCES_DB);

            const contentHtml = categories.map(cat => {
                const resources = RESOURCES_DB[cat];
                const { icon, color } = RESOURCE_ICONS[cat] || { icon: 'folder', color: 'text-gray-500' };

                const resourcesHtml = resources.map((res, index) => {
                    // Item Icon
                    let typeIcon = 'file-text';
                    let typeColor = 'text-neutral-500';
                    let typeLabel = res.type;

                    if (res.type === 'Sheet') { typeIcon = 'table'; typeColor = 'text-green-400'; }
                    if (res.type === 'Video') { typeIcon = 'play-circle'; typeColor = 'text-red-400'; }
                    if (res.type === 'Template') { typeIcon = 'file-box'; typeColor = 'text-blue-400'; }

                    const openOnlineBtn = res.external_url ? `
                        <a href="${res.external_url}" target="_blank" onclick="event.stopPropagation()" class="px-3 py-1 bg-purple-500/10 hover:bg-purple-500/20 text-purple-400 text-xs rounded-lg border border-purple-500/20 transition-colors flex items-center gap-1 whitespace-nowrap">
                            Open Online <i data-lucide="external-link" class="w-3 h-3"></i>
                        </a>
                    ` : '';

                    // CARD VIEW
                    if (currentView === 'card') {
                        return `
                        <div onclick="openModal('${cat}', ${index})" class="bg-neutral-900 border border-neutral-800 rounded-xl overflow-hidden hover:border-neutral-600 transition-all cursor-pointer group flex flex-col h-full">
                            <div class="h-40 bg-neutral-800/50 relative overflow-hidden flex items-center justify-center group-hover:bg-neutral-800 transition-colors shrink-0">
                                <div class="absolute inset-0 bg-[url('https://grainy-gradients.vercel.app/noise.svg')] opacity-10"></div>
                                <i data-lucide="${typeIcon}" class="w-12 h-12 ${typeColor} opacity-50 group-hover:scale-110 transition-transform"></i>
                            </div>
                            <div class="p-5 flex-1 flex flex-col">
                                <div class="flex justify-between items-start mb-2 gap-2">
                                    <h4 class="text-lg font-bold text-white group-hover:text-purple-400 transition-colors line-clamp-2">${res.title}</h4>
                                </div>
                                <p class="text-xs text-neutral-400 font-medium mb-3 line-clamp-2">${res.description || 'No description available.'}</p>
                                <div class="mt-auto flex items-center justify-between pt-4 border-t border-neutral-800/50">
                                    <div class="text-sm text-neutral-500 group-hover:text-neutral-300 flex items-center">
                                        View Content <i data-lucide="eye" class="w-3 h-3 ml-2"></i>
                                    </div>
                                    ${openOnlineBtn}
                                </div>
                            </div>
                        </div>
                        `;
                    }
                    // ROW VIEW
                    else {
                        return `
                        <div onclick="openModal('${cat}', ${index})" class="bg-neutral-900 border border-neutral-800 rounded-xl p-4 hover:border-neutral-600 transition-all cursor-pointer group flex items-center gap-6">
                            <!-- Icon -->
                            <div class="w-12 h-12 bg-neutral-800 rounded-lg flex items-center justify-center shrink-0 border border-neutral-700">
                                <i data-lucide="${typeIcon}" class="w-6 h-6 ${typeColor}"></i>
                            </div>
                            
                            <!-- Content -->
                            <div class="flex-1 min-w-0">
                                <h4 class="text-base font-bold text-white group-hover:text-purple-400 transition-colors truncate">${res.title}</h4>
                                <p class="text-xs text-neutral-400 truncate">${res.description || 'No description available.'}</p>
                            </div>

                            <!-- Meta / Actions -->
                            <div class="flex items-center gap-4 shrink-0">
                                <span class="hidden md:inline-block px-2 py-1 bg-neutral-800 rounded text-xs text-neutral-500 font-mono border border-neutral-700">${res.type}</span>
                                <div class="text-sm text-neutral-500 group-hover:text-neutral-300 hidden sm:flex items-center">
                                    View <i data-lucide="eye" class="w-3 h-3 ml-1"></i>
                                </div>
                                ${openOnlineBtn}
                            </div>
                        </div>
                        `;
                    }
                }).join('');

                const gridClass = currentView === 'card'
                    ? 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6'
                    : 'flex flex-col gap-3';

                return `
                <div class="mb-12">
                     <div class="flex items-center gap-4 mb-6">
                        <div class="w-8 h-8 bg-neutral-800 rounded-lg flex items-center justify-center border border-neutral-700">
                            <i data-lucide="${icon}" class="w-4 h-4 text-purple-400"></i>
                        </div>
                        <h2 class="text-xl font-bold text-white">${cat}</h2>
                        <span class="text-neutral-500 font-mono text-xs bg-neutral-900 px-2 py-1 rounded border border-neutral-800">${resources.length} items</span>
                     </div>
                     <div class="${gridClass}">
                        ${resourcesHtml}
                     </div>
                </div>
                `;
            }).join('');

            container.innerHTML = `<div class="animate-fade-in">${contentHtml}</div>`;
            lucide.createIcons();
        }

        function toggleView(view) {
            currentView = view;
            renderResources();
        }

        function openModal(categoryKey, index) {
            const resource = RESOURCES_DB[categoryKey][index];
            const modal = document.getElementById('resource-modal');
            const content = document.getElementById('modal-content');

            // 1. Populate Header
            document.getElementById('modal-title').textContent = resource.title;
            document.getElementById('modal-desc').textContent = resource.description || "No description provided.";
            document.getElementById('modal-resource-type').textContent = resource.type;
            document.getElementById('modal-category-badge').textContent = categoryKey;

            const btn = document.getElementById('modal-link');
            if (resource.external_url) {
                btn.href = resource.external_url;
                btn.classList.remove('hidden');
                btn.classList.add('flex');
            } else {
                btn.classList.add('hidden');
                btn.classList.remove('flex');
            }

            // Populate Metadata
            document.getElementById('meta-type').textContent = resource.type;
            document.getElementById('meta-category').textContent = categoryKey;
            //  Default placeholders since DB doesn't have these fields yet
            //  But we show the grid anyway for structure
            document.getElementById('modal-meta-grid').classList.remove('hidden');


            // 2. Dynamic Content (Sheets logic)
            const dynamicContainer = document.getElementById('modal-dynamic-content');
            dynamicContainer.innerHTML = ''; // Reset

            const linkify = (text) => {
                if (!text) return '';
                const urlRegex = /(https?:\/\/[^\s]+)/g;
                return text.replace(urlRegex, '<a href="/portfolio/quests/$1" target="_blank" class="text-purple-400 hover:text-purple-300 underline">$1</a>');
            };

            if (resource.type === 'Sheet' && resource.content) {
                const sheetNames = Object.keys(resource.content);
                const tabsHtml = sheetNames.map((name, i) => `
                    <button onclick="switchResourceTab(this, '${name.replace(/[^a-zA-Z0-9]/g, '')}')" class="px-4 py-2 text-sm font-medium rounded-t-lg transition-colors ${i === 0 ? 'bg-neutral-800 text-white border-t border-x border-neutral-700' : 'text-neutral-500 hover:text-neutral-300'}">
                        ${name}
                    </button>
                `).join('');

                const tablesHtml = sheetNames.map((name, i) => {
                    const rows = resource.content[name];
                    const safeName = name.replace(/[^a-zA-Z0-9]/g, '');
                    if (!rows || rows.length === 0) return `<div id="res-tab-${safeName}" class="${i === 0 ? '' : 'hidden'} p-8 text-neutral-500 text-center">Empty Sheet</div>`;
                    const headers = Object.keys(rows[0]);
                    return `
                    <div id="res-tab-${safeName}" class="${i === 0 ? '' : 'hidden'} overflow-x-auto custom-scrollbar bg-neutral-800 rounded-b-xl border border-neutral-700">
                        <table class="w-full text-left text-sm whitespace-nowrap">
                            <thead class="bg-neutral-900/50 text-neutral-400 font-medium border-b border-neutral-700">
                                <tr>${headers.map(h => `<th class="px-6 py-3">${h}</th>`).join('')}</tr>
                            </thead>
                            <tbody class="divide-y divide-neutral-700/50">
                                ${rows.map(row => `
                                    <tr class="hover:bg-neutral-700/30 transition-colors">
                                        ${headers.map(h => `<td class="px-6 py-3 text-neutral-300 border-r border-neutral-800/50 last:border-0">${linkify(String(row[h] || '').substring(0, 500))}</td>`).join('')}
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>`;
                }).join('');
                dynamicContainer.innerHTML = `<div class="space-y-4"><div class="flex border-b border-neutral-800 gap-1 overflow-x-auto scrollbar-hide">${tabsHtml}</div><div>${tablesHtml}</div></div>`;
            } else if (resource.content) {
                // Generic Text
                dynamicContainer.innerHTML = `
                    <div class="bg-neutral-800 rounded-xl border border-neutral-700 p-8 md:p-12 prose prose-invert max-w-none">
                        <pre class="whitespace-pre-wrap font-sans text-neutral-300 leading-relaxed">${linkify(resource.content)}</pre>
                    </div>
                `;
            }

            // 3. Open Modal
            modal.classList.remove('hidden');
            // Force Reflow
            void modal.offsetWidth;
            modal.classList.remove('opacity-0');
            content.classList.remove('scale-95');
            content.classList.add('scale-100');

            document.body.style.overflow = 'hidden';
            lucide.createIcons();
        }

        function closeModal() {
            const modal = document.getElementById('resource-modal');
            const content = document.getElementById('modal-content');

            modal.classList.add('opacity-0');
            content.classList.remove('scale-100');
            content.classList.add('scale-95');

            setTimeout(() => {
                modal.classList.add('hidden');
                document.body.style.overflow = '';
            }, 300);
        }

        window.switchResourceTab = function (btn, tabId) {
            const parent = btn.parentElement;
            Array.from(parent.children).forEach(child => child.className = 'px-4 py-2 text-sm font-medium rounded-t-lg transition-colors text-neutral-500 hover:text-neutral-300');
            btn.className = 'px-4 py-2 text-sm font-medium rounded-t-lg transition-colors bg-neutral-800 text-white border-t border-x border-neutral-700';
            const container = parent.nextElementSibling;
            Array.from(container.children).forEach(child => child.classList.add('hidden'));
            document.getElementById(`res-tab-${tabId}`).classList.remove('hidden');
        };
    </script>
</body>

</html>
