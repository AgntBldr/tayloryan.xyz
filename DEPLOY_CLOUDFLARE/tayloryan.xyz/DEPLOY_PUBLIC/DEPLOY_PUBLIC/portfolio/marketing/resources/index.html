<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Resources | Taylor Ryan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="/assets/js/marketing_data.js"></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #000;
            color: #fff;
        }
    </style>
    <link rel="canonical" href="https://taylorryan.xyz/DEPLOY_PUBLIC/portfolio/marketing/resources/">
    <meta property="og:url" content="https://taylorryan.xyz/DEPLOY_PUBLIC/portfolio/marketing/resources/">
</head>

<body class="min-h-screen relative">
    <script src="/assets/js/layout.js?v=20260202-1333?v=20260130-1207?v=20260130-1201?v=20260130-1148?v=20260130-1136?v=20260130-1113?v=20260130-1111?v=20260130-1042?v=20260130-1032?v=20260130-1030?v=20260130-1026?v=20260130-1002?v=20260130-1001?v=20260130-0934?v=20260129-1743?v=20260129-1708?v=20260129-1434?v=20260129-1433?v=20260129-1430?v=20260129-1402?v=20260129-1352?v=20260129-1343?v=20260129-1314?v=20260128-0754?v=20260128-0749?v=20260128-0740?v=20260127-2208?v=20260127-2207?v=20260127-1855?v=20260127-1852?v=20260127-1801?v=20260127-1756?v=20260127-1721?v=20260127-1546?v=20260127-1537?v=20260127-1521?v=20260127-1521?v=20260127-1519?v=20260127-1518?v=20260127-2"></script>

    <div class="pt-32 pb-20 max-w-7xl mx-auto px-6">

        <!-- Header -->
        <header class="mb-12 text-center relative z-10 flex flex-col items-center">
            <h1
                class="text-5xl font-extrabold mb-6 text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-emerald-600">
                Creator Resources
            </h1>
            <p class="text-neutral-400 max-w-2xl mx-auto text-lg mb-8">
                Templates, guides, and assets used to scale the program.
            </p>

            <!-- Navigation -->
            <div class="bg-neutral-900 border border-neutral-800 p-1 rounded-full flex gap-1 relative z-20">
                <a href="/portfolio/marketing/overview/"
                    class="px-6 py-2 rounded-full text-sm font-bold text-neutral-500 hover:text-white transition-all">Overview</a>
                <a href="/portfolio/marketing/resources/"
                    class="px-6 py-2 rounded-full text-sm font-bold bg-neutral-800 text-white shadow-lg transition-all">Resources</a>
                <a href="/portfolio/marketing/analytics/"
                    class="px-6 py-2 rounded-full text-sm font-bold text-neutral-500 hover:text-white transition-all">Analytics</a>
            </div>
        </header>

        <!-- Resources Grid -->
        <div id="resources-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center text-neutral-500 py-12">Loading resources...</div>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderResources();
            lucide.createIcons();
        });

        function renderResources() {
            const container = document.getElementById('resources-grid');
            if (typeof MARKETING_RESOURCES === 'undefined' || !MARKETING_RESOURCES.length) {
                container.innerHTML = '<div class="col-span-full text-center text-neutral-500">No resources found.</div>';
                return;
            }

            container.innerHTML = MARKETING_RESOURCES.map(res => {
                // Link, GoogleLink, Description, Notes
                const link = res.GoogleLink || res.Link;
                const title = res.Link || 'Untitled Resource';
                const desc = res.Description || res.Notes || 'No description provided.';

                return `
                <a href="${link}" target="_blank" class="group bg-neutral-900 border border-neutral-800 rounded-2xl p-6 hover:border-green-500/50 transition-all flex flex-col h-full">
                    <div class="flex justify-between items-start mb-4">
                        <div class="w-12 h-12 bg-neutral-800 rounded-xl flex items-center justify-center border border-neutral-700 group-hover:bg-green-500/10 group-hover:text-green-400 transition-colors">
                            <i data-lucide="file-text" class="w-6 h-6 text-neutral-400"></i>
                        </div>
                        <i data-lucide="external-link" class="w-5 h-5 text-neutral-600 group-hover:text-green-400 transition-colors"></i>
                    </div>
                    
                    <h3 class="text-xl font-bold text-white mb-2 group-hover:text-green-400 transition-colors line-clamp-2">${title}</h3>
                    <p class="text-neutral-400 text-sm leading-relaxed mb-4 flex-1 line-clamp-3">${desc}</p>
                    
                    <div class="text-xs font-mono text-neutral-500 pt-4 border-t border-neutral-800 group-hover:text-neutral-400 transition-colors">
                        View Document ->
                    </div>
                </a>
                `;
            }).join('');

            lucide.createIcons();
        }
    </script>
</body>

</html>
