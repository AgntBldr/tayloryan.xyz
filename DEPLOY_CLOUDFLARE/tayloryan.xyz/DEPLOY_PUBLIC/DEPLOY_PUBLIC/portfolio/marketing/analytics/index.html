<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/assets/js/marketing_data.js"></script>
    <style>

            font-family: 'Outfit', sans-serif;

            color: #fff;
        }
    </style>
    <link rel="canonical" href="https://taylorryan.xyz/DEPLOY_PUBLIC/portfolio/marketing/analytics/">
    <meta property="og:url" content="https://taylorryan.xyz/DEPLOY_PUBLIC/portfolio/marketing/analytics/">
</head>

<body class="min-h-screen relative">
    <script src="/assets/js/layout.js?v=20260202-1822?v=20260130-1207?v=20260130-1201?v=20260130-1148?v=20260130-1136?v=20260130-1113?v=20260130-1111?v=20260130-1042?v=20260130-1032?v=20260130-1030?v=20260130-1026?v=20260130-1002?v=20260130-1001?v=20260130-0934?v=20260129-1743?v=20260129-1708?v=20260129-1434?v=20260129-1433?v=20260129-1430?v=20260129-1402?v=20260129-1352?v=20260129-1343?v=20260129-1314?v=20260128-0754?v=20260128-0749?v=20260128-0740?v=20260127-2208?v=20260127-2207?v=20260127-1855?v=20260127-1852?v=20260127-1801?v=20260127-1756?v=20260127-1721?v=20260127-1546?v=20260127-1537?v=20260127-1521?v=20260127-1521?v=20260127-1519?v=20260127-1518?v=20260127-2"></script>

    <div class="pt-32 pb-20 max-w-7xl mx-auto px-6">

        <!-- Header -->
        <header class="mb-12 text-center relative z-10 flex flex-col items-center">
            <h1
                class="text-5xl font-extrabold mb-6 text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-emerald-600">
                Performance Analytics
            </h1>
            <p class="text-neutral-400 max-w-2xl mx-auto text-lg mb-8">
                Data-driven insights from the Content Creator Program.
            </p>

            <!-- Navigation -->
            <div class="bg-neutral-900 border border-neutral-800 p-1 rounded-full flex gap-1 relative z-20">
                <a href="/portfolio/marketing/overview/"
                    class="px-6 py-2 rounded-full text-sm font-bold text-neutral-500 hover:text-white transition-all">Overview</a>
                <a href="/portfolio/marketing/resources/"
                    class="px-6 py-2 rounded-full text-sm font-bold text-neutral-500 hover:text-white transition-all">Resources</a>
                <a href="/portfolio/marketing/analytics/"
                    class="px-6 py-2 rounded-full text-sm font-bold bg-neutral-800 text-white shadow-lg transition-all">Analytics</a>
            </div>
        </header>

        <!-- Key Metrics -->
        <div id="metrics-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-12">
            <!-- Injected via JS -->
        </div>

        <!-- Charts -->
        <div class="grid grid-cols-1 gap-8">
            <div class="bg-neutral-900/50 border border-neutral-800 p-8 rounded-2xl">
                <h3 class="text-xl font-bold text-white mb-6">Program Growth Over Time</h3>
                <div class="h-[400px] w-full">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderAnalytics();
            lucide.createIcons();
        });

        function renderAnalytics() {
            if (typeof MARKETING_ANALYTICS === 'undefined' || !MARKETING_ANALYTICS.length) {
                document.getElementById('metrics-grid').innerHTML = '<div class="col-span-full text-center text-red-500">No analytics data found.</div>';
                return;
            }

            const data = MARKETING_ANALYTICS;

            // 1. Identify Columns (dynamically find numeric columns excluding 'Month')
            const columns = Object.keys(data[0]).filter(k => k !== 'Month');

            // 2. Render Key Metrics (Totals)
            const totals = {};
            columns.forEach(col => {
                totals[col] = data.reduce((sum, row) => sum + (parseFloat(row[col]) || 0), 0);
            });

            const metricsGrid = document.getElementById('metrics-grid');
            metricsGrid.innerHTML = columns.map(col => `
                <div class="bg-neutral-900 border border-neutral-800 p-6 rounded-2xl">
                    <span class="block text-xs font-bold text-neutral-500 uppercase tracking-wider mb-2">${col}</span>
                    <div class="text-3xl font-extrabold text-white">${totals[col].toLocaleString()}</div>
                </div>
            `).join('');

            // 3. Render Chart
            const ctx = document.getElementById('mainChart').getContext('2d');
            const labels = data.map(d => d.Month); // Assumes Month column exists

            const datasets = columns.map((col, index) => {
                const colors = ['#4ade80', '#60a5fa', '#f472b6', '#fbbf24'];
                const color = colors[index % colors.length];
                return {
                    label: col,
                    data: data.map(d => d[col]),
                    borderColor: color,
                    backgroundColor: color + '20', // transparent fill
                    borderWidth: 3,
                    tension: 0.4,
                    fill: true
                };
            });

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top', labels: { color: '#fff' } }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#94a3b8' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#94a3b8' }
                        }
                    }
                }
            });
        }
    </script>
</body>

</html>
