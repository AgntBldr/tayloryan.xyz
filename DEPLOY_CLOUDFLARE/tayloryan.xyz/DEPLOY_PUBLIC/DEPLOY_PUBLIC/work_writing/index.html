<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writing & Content | Taylor Ryan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/DEPLOY_PUBLIC/assets/js/writing_data.js"></script>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }

        .gradient-text {
            background: linear-gradient(to right, #22c55e, #14b8a6, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        /* Smooth fade in */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
    <link rel="canonical" href="https://taylorryan.xyz/DEPLOY_PUBLIC/work_writing/">
    <meta property="og:url" content="https://taylorryan.xyz/DEPLOY_PUBLIC/work_writing/">
</head>

<body class="min-h-screen relative overflow-x-hidden">
    <!-- Global Layout -->
    <script src="/DEPLOY_PUBLIC/assets/js/layout.js?v=20260202-1339"></script>
    <script src="/DEPLOY_PUBLIC/assets/js/work_sidebar.js?v=20260202-1339"></script>
    <script src="/DEPLOY_PUBLIC/assets/js/work_scroll.js?v=20260202-1339"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!document.getElementById('work-sidebar')) {
                renderWorkSidebar('writing');
            }
        });
    </script>

    <!-- Modal Container -->
    <div id="modal-container" class="fixed inset-0 z-[60] hidden">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4">
            <div class="bg-neutral-900 border border-neutral-800 w-full max-w-4xl max-h-[90vh] rounded-2xl overflow-y-auto custom-scrollbar relative shadow-2xl"
                onclick="event.stopPropagation()">
                <button onclick="closeModal()"
                    class="absolute top-4 right-4 p-2 bg-black/50 hover:bg-neutral-800 rounded-full text-white transition-colors z-10 border border-neutral-700">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
                <div id="modal-content"></div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-6 py-24 relative z-10">

        <!-- Header Section -->
        <div class="text-center mb-12">
            <div
                class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-green-500/10 border border-green-500/20 text-green-400 text-xs font-bold uppercase tracking-wider mb-6">
                <i data-lucide="pen-tool" class="w-4 h-4"></i> Work Portfolio
            </div>

            <h1 class="text-5xl md:text-7xl font-bold mb-6 tracking-tight">
                Writing & <span class="gradient-text">Content</span>
            </h1>

            <p class="text-xl text-neutral-400 max-w-3xl mx-auto leading-relaxed">
                Articles, guides, and thought leadership across Fintech, Blockchain, Support, and Growth.
            </p>
        </div>

        <!-- 1. DATA BANNER -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-20">
            <div
                class="bg-neutral-900/50 border border-neutral-800 p-6 rounded-2xl text-center hover:border-green-500/30 transition-colors">
                <div class="text-3xl font-extrabold text-green-500 mb-1" id="stat-total">0</div>
                <div class="text-xs text-neutral-400 uppercase tracking-widest">Total Articles</div>
            </div>
            <div
                class="bg-neutral-900/50 border border-neutral-800 p-6 rounded-2xl text-center hover:border-teal-500/30 transition-colors">
                <div class="text-3xl font-extrabold text-teal-500 mb-1" id="stat-publishers">0</div>
                <div class="text-xs text-neutral-400 uppercase tracking-widest">Publishers</div>
            </div>
            <div
                class="bg-neutral-900/50 border border-neutral-800 p-6 rounded-2xl text-center hover:border-blue-500/30 transition-colors">
                <div class="text-3xl font-extrabold text-blue-500 mb-1" id="stat-live">0%</div>
                <div class="text-xs text-neutral-400 uppercase tracking-widest">Live Content</div>
            </div>
            <div
                class="bg-neutral-900/50 border border-neutral-800 p-6 rounded-2xl text-center hover:border-purple-500/30 transition-colors">
                <div class="text-3xl font-extrabold text-purple-500 mb-1" id="stat-year">2019</div>
                <div class="text-xs text-neutral-400 uppercase tracking-widest">First Article</div>
            </div>
        </div>

        <!-- Filters & Search -->
        <div class="mb-8">
            <div class="flex flex-col gap-6 border-b border-neutral-800 pb-8">
                <div class="flex justify-between items-center">
                    <h2 class="text-3xl font-bold text-white">Library</h2>
                    <span class="text-sm text-neutral-500" id="count-display">Loading...</span>
                </div>

                <div class="flex flex-col md:flex-row gap-4 items-center">
                    <!-- Search -->
                    <div class="relative flex-1 w-full">
                        <i data-lucide="search"
                            class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-neutral-500"></i>
                        <input type="text" id="search-input" oninput="renderArticles()"
                            placeholder="Search titles, publishers, topics..."
                            class="w-full bg-neutral-900 border border-neutral-700 text-white rounded-lg pl-10 pr-4 py-2.5 outline-none focus:ring-2 focus:ring-green-500">
                    </div>

                    <div class="flex items-center gap-4 w-full md:w-auto">
                        <!-- Category Filter -->
                        <select id="category-filter" onchange="renderArticles()"
                            class="bg-neutral-900 border border-neutral-700 text-neutral-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-green-500 outline-none flex-1 md:w-40">
                            <option value="all">All Topics</option>
                            <option value="Startups">Startups</option>
                            <option value="Web3">Web3 & Crypto</option>
                            <option value="Growth">Growth</option>
                            <option value="Innovation">Innovation</option>
                            <option value="Investment">Investment</option>
                            <option value="Leadership">Leadership</option>
                        </select>

                        <!-- Status Filter -->
                        <select id="status-filter" onchange="renderArticles()"
                            class="bg-neutral-900 border border-neutral-700 text-neutral-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-green-500 outline-none flex-1 md:w-36">
                            <option value="all">All Status</option>
                            <option value="live">Live Only</option>
                            <option value="dead">Dead / Archive</option>
                        </select>

                        <!-- View Toggle -->
                        <div class="flex items-center gap-1 bg-neutral-900 border border-neutral-700 p-1 rounded-lg">
                            <button onclick="switchView('list')" id="btn-list"
                                class="p-1.5 rounded text-white bg-neutral-700 shadow-sm transition-all hover:text-white"
                                title="List View">
                                <i data-lucide="list" class="w-4 h-4"></i>
                            </button>
                            <button onclick="switchView('grid')" id="btn-grid"
                                class="p-1.5 rounded text-neutral-500 hover:text-white transition-all"
                                title="Grid View">
                                <i data-lucide="layout-grid" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Article List -->
        <div id="articles-list" class="space-y-12 mb-24 min-h-[400px]">
            <!-- Populated and Grouped by Year -->
            <div class="text-center py-20">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-green-500 mx-auto mb-4"></div>
                <p class="text-neutral-500">Loading library...</p>
            </div>
        </div>

    </main>

    <script>
        let processedData = [];
        let currentView = 'list'; // Default view

        document.addEventListener('DOMContentLoaded', () => {
            // Wait briefly for data to ensure load
            setTimeout(initData, 100);
        });

        function switchView(mode) {
            currentView = mode;
            const btnList = document.getElementById('btn-list');
            const btnGrid = document.getElementById('btn-grid');
            const listContainer = document.getElementById('articles-list');

            // Update Buttons
            if (mode === 'list') {
                btnList.classList.add('bg-neutral-700', 'text-white', 'shadow-sm');
                btnList.classList.remove('text-neutral-500');
                btnGrid.classList.remove('bg-neutral-700', 'text-white', 'shadow-sm');
                btnGrid.classList.add('text-neutral-500');

                // Reset Grid Classes
                listContainer.classList.remove('grid', 'grid-cols-1', 'md:grid-cols-2', 'lg:grid-cols-3', 'gap-6');
            } else {
                btnGrid.classList.add('bg-neutral-700', 'text-white', 'shadow-sm');
                btnGrid.classList.remove('text-neutral-500');
                btnList.classList.remove('bg-neutral-700', 'text-white', 'shadow-sm');
                btnList.classList.add('text-neutral-500');

                // Add Grid Classes
                listContainer.classList.remove('space-y-12');
                listContainer.classList.add('grid', 'grid-cols-1', 'md:grid-cols-2', 'lg:grid-cols-3', 'gap-6');
            }
            renderArticles();
        }

        function initData() {
            if (typeof WRITING_DATA === 'undefined') {
                console.error("No Data Found");
                document.getElementById('articles-list').innerHTML = '<div class="text-center text-neutral-500 py-10">No data available. Please check assets/js/writing_data.js</div>';
                return;
            }

            // Normalize Data
            processedData = WRITING_DATA.map(item => {
                const title = item['Article Title'] || item.title || 'Untitled';
                const theme = item['Primary Theme'] || item.theme || 'General';
                const status = item['Status'] || item.status || 'Unknown';
                const dateRaw = item['Date'] || item.date;
                const org = item['Organization'] || item.tags?.[0] || 'Unknown';

                // Map Theme for Filtering
                let filterCategory = 'Other';
                const t = theme.toLowerCase();
                if (t.includes('start-up') || t.includes('entrepreneur')) filterCategory = 'Startups';
                else if (t.includes('crypto') || t.includes('blockchain') || t.includes('fintech')) filterCategory = 'Web3';
                else if (t.includes('growth') || t.includes('marketing')) filterCategory = 'Growth';
                else if (t.includes('innovation')) filterCategory = 'Innovation';
                else if (t.includes('investment')) filterCategory = 'Investment';
                else if (t.includes('leadership')) filterCategory = 'Leadership';

                return {
                    ...item,
                    title: title,
                    url: item['URL'] || item.url || '',
                    description: item['Description'] || item.description || '',
                    pdf: item['PDF Saved'] || item.pdf || '',
                    status: status,
                    isLive: status.trim().toLowerCase() === 'live',
                    theme: theme,
                    filterCategory: filterCategory,
                    organization: org,
                    date: dateRaw,
                    dateObj: new Date(dateRaw),
                    year: new Date(dateRaw).getFullYear() || 'N/A'
                };
            }).sort((a, b) => {
                return (b.dateObj instanceof Date && !isNaN(b.dateObj) ? b.dateObj : 0) -
                    (a.dateObj instanceof Date && !isNaN(a.dateObj) ? a.dateObj : 0);
            });

            updateStats();
            renderArticles();
            lucide.createIcons();
        }

        function updateStats() {
            const total = processedData.length;
            const publishers = new Set(processedData.map(d => d.organization)).size;
            const liveCount = processedData.filter(d => d.isLive).length;
            const livePct = total > 0 ? Math.round((liveCount / total) * 100) : 0;
            const years = processedData.map(d => d.year).filter(y => !isNaN(y) && y > 2000);
            const minYear = years.length ? Math.min(...years) : 2018;

            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-publishers').innerText = publishers;
            document.getElementById('stat-live').innerText = livePct + '%';
            document.getElementById('stat-year').innerText = minYear;
        }

        function renderArticles() {
            const container = document.getElementById('articles-list');
            const search = document.getElementById('search-input').value.toLowerCase();
            const filterCat = document.getElementById('category-filter').value;
            const statusFilter = document.getElementById('status-filter').value;

            container.innerHTML = '';

            const filtered = processedData.filter(d => {
                const matchSearch = (d.title.toLowerCase().includes(search)) ||
                    (d.organization.toLowerCase().includes(search)) ||
                    (d.theme.toLowerCase().includes(search));

                const matchCat = filterCat === 'all' || d.filterCategory === filterCat;

                const matchStatus = statusFilter === 'all' ||
                    (statusFilter === 'live' && d.isLive) ||
                    (statusFilter === 'dead' && !d.isLive);

                return matchSearch && matchCat && matchStatus;
            });

            document.getElementById('count-display').innerText = `${filtered.length} Items`;

            if (filtered.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center py-20 text-neutral-500">No articles found matching your criteria.</div>';
                return;
            }

            if (currentView === 'list') {
                renderListView(container, filtered);
            } else {
                renderGridView(container, filtered);
            }

            lucide.createIcons();
        }

        function renderListView(container, items) {
            // Use space-y layout
            if (container.classList.contains('grid')) {
                container.classList.remove('grid', 'grid-cols-1', 'md:grid-cols-2', 'lg:grid-cols-3', 'gap-6');
                container.classList.add('space-y-12');
            }

            // Group by Year
            const years = [...new Set(items.map(d => d.year))].sort((a, b) => b - a);

            years.forEach(year => {
                if (year === 'N/A') return;

                const yearItems = items.filter(d => d.year === year);
                const section = document.createElement('div');
                section.className = "animate-fade-in";
                section.innerHTML = `
                    <div class="flex items-center gap-4 mb-6">
                        <h2 class="text-2xl font-bold text-neutral-500">${year}</h2>
                        <div class="h-[1px] bg-neutral-800 flex-1"></div>
                    </div>
                    <div class="grid grid-cols-1 gap-2"></div>
                `;

                const grid = section.querySelector('.grid');
                yearItems.forEach(item => {
                    const row = document.createElement('div');
                    row.className = "group flex flex-col md:flex-row md:items-center gap-4 p-4 rounded-xl hover:bg-neutral-900 border border-transparent hover:border-neutral-800 transition-all cursor-pointer";
                    row.onclick = () => openModal(item.title);

                    const statusColor = item.isLive ? 'bg-green-500' : 'bg-red-500';
                    const dateStr = item.dateObj instanceof Date && !isNaN(item.dateObj)
                        ? item.dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
                        : 'Unknown';

                    row.innerHTML = `
                        <!-- Date -->
                        <div class="hidden md:block w-24 shrink-0 text-sm text-neutral-500 font-mono pt-1">
                            ${dateStr}
                        </div>

                        <!-- Main Info -->
                        <div class="flex-1 min-w-0">
                            <h3 class="text-lg font-bold text-white group-hover:text-green-400 transition-colors truncate pr-4">
                                ${item.title}
                            </h3>
                            <div class="flex items-center gap-2 mt-1">
                                <span class="text-xs font-bold uppercase tracking-wider text-neutral-500">${item.organization}</span>
                                <span class="text-neutral-700 mx-1">â€¢</span>
                                <span class="text-xs text-neutral-400 truncate">${item.theme}</span>
                            </div>
                        </div>

                        <!-- Meta / Action -->
                        <div class="flex items-center justify-between md:justify-end gap-4 md:w-48 shrink-0 mt-2 md:mt-0">
                             <!-- Status -->
                             <div class="flex items-center gap-2 px-2 py-1 bg-neutral-900/50 rounded border border-neutral-800">
                                <div class="w-1.5 h-1.5 rounded-full ${statusColor} ${item.isLive ? 'animate-pulse' : ''}"></div>
                                <span class="text-[10px] font-bold uppercase text-neutral-400 tracking-wider">${item.isLive ? 'Live' : 'Dead'}</span>
                             </div>

                             <!-- Arrow -->
                             <div class="w-8 h-8 rounded-full bg-neutral-800 flex items-center justify-center text-neutral-400 group-hover:bg-green-500 group-hover:text-white transition-all">
                                 <i data-lucide="arrow-right" class="w-4 h-4"></i>
                             </div>
                        </div>
                    `;
                    grid.appendChild(row);
                });

                container.appendChild(section);
            });
        }

        function renderGridView(container, items) {
            // Ensure Grid Classes
            if (!container.classList.contains('grid')) {
                container.classList.remove('space-y-12');
                container.classList.add('grid', 'grid-cols-1', 'md:grid-cols-2', 'lg:grid-cols-3', 'gap-6');
            }

            container.innerHTML = items.map(item => {
                const statusColor = item.isLive ? 'bg-green-500' : 'bg-red-500';

                return `
                <div class="group flex flex-col h-full bg-neutral-900 border border-neutral-800 hover:border-green-500/50 rounded-2xl p-6 transition-all hover:-translate-y-1 cursor-pointer animate-fade-in" onclick="openModal('${item.title.replace(/'/g, "\\'")}')">
                    <div class="flex justify-between items-start mb-4">
                        <span class="px-2 py-1 bg-neutral-800 rounded text-[10px] uppercase font-bold tracking-wider text-neutral-400 border border-neutral-700 truncate max-w-[150px]">${item.theme}</span>
                        <div class="flex items-center gap-2">
                             ${item.pdf ? '<i data-lucide="file-text" class="w-4 h-4 text-neutral-500"></i>' : ''}
                            <div class="w-2 h-2 rounded-full ${statusColor} shadow-[0_0_8px] shadow-${item.isLive ? 'green' : 'red'}-500/50"></div>
                        </div>
                    </div>
                    
                    <h3 class="text-xl font-bold text-white mb-3 group-hover:text-green-400 transition-colors line-clamp-2">${item.title}</h3>
                    <p class="text-sm text-neutral-400 mb-6 line-clamp-3 flex-1">${item.description || 'No description available.'}</p>
                    
                    <div class="mt-auto pt-4 border-t border-neutral-800 flex items-center justify-between">
                         <div class="flex flex-col">
                             <span class="text-xs text-neutral-500 font-bold uppercase tracking-wider">${item.organization}</span>
                             <span class="text-[10px] text-neutral-600 font-mono">${item.year}</span>
                         </div>
                         <div class="w-8 h-8 rounded-full bg-neutral-800 flex items-center justify-center group-hover:bg-green-500 group-hover:text-white transition-colors">
                             <i data-lucide="arrow-right" class="w-4 h-4"></i>
                         </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function openModal(title) {
            // Re-find item (safe enough for this scale)
            const item = processedData.find(d => d.title === title);
            if (!item) return;

            const container = document.getElementById('modal-container');
            const content = document.getElementById('modal-content');

            const statusBadge = item.isLive
                ? '<span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-green-500/10 text-green-400 text-xs font-bold uppercase tracking-wider border border-green-500/20"><div class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div> Live Content</span>'
                : '<span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-red-500/10 text-red-400 text-xs font-bold uppercase tracking-wider border border-red-500/20"><div class="w-1.5 h-1.5 rounded-full bg-red-500"></div> Content Offline</span>';

            content.innerHTML = `
                <div class="h-40 bg-gradient-to-r from-green-900 to-teal-900 relative">
                    <div class="absolute inset-0 bg-black/20"></div>
                     <div class="absolute bottom-6 left-6 md:left-10 right-6">
                        <div class="flex flex-wrap items-center gap-3 mb-3">
                            ${statusBadge}
                             <span class="px-2 py-0.5 rounded bg-black/40 backdrop-blur text-white text-[10px] uppercase font-bold border border-white/10 tracking-wider">${item.filterCategory}</span>
                        </div>
                        <h2 class="text-2xl md:text-3xl font-bold text-white shadow-sm leading-tight">${item.title}</h2>
                    </div>
                </div>

                <div class="p-6 md:p-10 bg-neutral-900">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                        <div class="md:col-span-2 space-y-8">
                            <div>
                                <h3 class="text-lg font-bold text-white mb-2 flex items-center gap-2"><i data-lucide="info" class="w-4 h-4 text-neutral-500"></i> Summary</h3>
                                <p class="text-neutral-300 leading-relaxed text-lg">${item.description || 'No description available.'}</p>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-4">
                                <div class="bg-neutral-800/30 p-4 rounded-xl border border-neutral-800">
                                    <h4 class="text-xs font-bold text-neutral-500 uppercase tracking-widest mb-1">Publisher</h4>
                                    <p class="text-white font-medium">${item.organization}</p>
                                </div>
                                <div class="bg-neutral-800/30 p-4 rounded-xl border border-neutral-800">
                                    <h4 class="text-xs font-bold text-neutral-500 uppercase tracking-widest mb-1">Published</h4>
                                    <p class="text-white font-medium">${item.date || 'Unknown'}</p>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-4">
                            ${item.url ? `
                            <a href="${item.url}" target="_blank" class="flex items-center justify-center gap-2 w-full px-6 py-4 bg-white text-black font-bold rounded-xl hover:scale-[1.02] transition-transform shadow-lg shadow-green-500/20">
                                Read Online <i data-lucide="external-link" class="w-4 h-4"></i>
                            </a>` : ''}
                            
                            ${item.pdf ? `
                            <a href="../Ref Docs/Work/Writing/Archived_PDFs/${item.pdf}" target="_blank" class="flex items-center justify-center gap-2 w-full px-6 py-4 bg-neutral-800 text-white font-bold rounded-xl hover:bg-neutral-700 hover:scale-[1.02] transition-all border border-neutral-700">
                                View PDF Archive <i data-lucide="file-text" class="w-4 h-4"></i>
                            </a>
                            <p class="text-xs text-center text-neutral-500 mt-2">Use PDF if original link is dead.</p>
                            ` : ''}

                            ${!item.url && !item.pdf ? `
                            <div class="p-4 bg-neutral-800/50 rounded-xl border border-neutral-700 text-center text-neutral-400 text-sm">
                                Content currently unavailable (Link Dead / No Archive)
                            </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;

            container.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            lucide.createIcons();
        }

        function closeModal() {
            document.getElementById('modal-container').classList.add('hidden');
            document.body.style.overflow = '';
        }
    </script>
</body>

</html>
