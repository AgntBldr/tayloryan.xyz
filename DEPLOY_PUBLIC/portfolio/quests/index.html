<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Taylor's Quest Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../assets/resources_data.js"></script>
    <script src="../../quests_data.js"></script>
    <!-- Note: quests_data.js path might need verification if it was at root or assets. The original file had <script src="quests_data.js"> implies it was at root. I should move it to assets/js/ or reference it correctly. I'll check file location later, assuming ../../quests_data.js for now if it's at root. -->
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }

        .card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(139, 92, 246, 0.15);
            border-color: #7c3aed;
        }

        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
        }

        /* Custom Select Style */
        select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a3a3a3' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
        }
    </style>
</head>

<body class="min-h-screen p-6 md:p-12 relative md:pl-72">
    <!-- Global Layout -->
    <script src="../../assets/js/layout.js?v=20260128-0740"></script>
    <script src="../../assets/js/work_sidebar.js?v=20260128-0740"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof renderWorkSidebar === 'function') renderWorkSidebar('quests');
        });
    </script>

    <!-- Header -->
    <header class="mb-12 text-center relative z-10 flex flex-col items-center mt-24">
        <h1
            class="text-5xl font-bold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-purple-500 to-pink-500">
            Quest Portfolio
        </h1>
        <p class="text-neutral-400 max-w-2xl mx-auto text-lg mb-8">
            Discover 40+ on-chain activations and growth campaigns designed to drive engagement.
        </p>

        <!-- View Toggle (Navigation) -->
        <div class="bg-neutral-900 border border-neutral-800 p-1 rounded-full flex gap-1 relative z-20">
            <a href="index.html"
                class="px-6 py-2 rounded-full text-sm font-bold transition-all bg-neutral-800 text-white shadow-lg">Portfolio</a>
            <a href="overview.html"
                class="px-6 py-2 rounded-full text-sm font-bold text-neutral-500 hover:text-white transition-all">Overview</a>
            <a href="analytics.html"
                class="px-6 py-2 rounded-full text-sm font-bold text-neutral-500 hover:text-white transition-all">Analytics</a>
            <a href="resources.html"
                class="px-6 py-2 rounded-full text-sm font-bold text-neutral-500 hover:text-white transition-all">Resources</a>
        </div>
    </header>

    <!-- Controls -->
    <div id="controls-container"
        class="relative z-50 max-w-7xl mx-auto mb-8 flex flex-col md:flex-row justify-between items-center gap-4 bg-neutral-900/50 p-4 rounded-2xl border border-neutral-800 backdrop-blur-sm">
        <!-- Filter Dropdown -->
        <div class="flex items-center gap-3 w-full md:w-auto">
            <span class="text-neutral-500 text-sm font-medium uppercase tracking-wider">Filter By:</span>
            <div class="relative w-full md:w-64">
                <select id="type-filter" onchange="filterQuests()"
                    class="w-full pl-4 pr-10 py-2.5 bg-neutral-800 border border-neutral-700 rounded-lg text-neutral-200 text-sm focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-colors cursor-pointer hover:bg-neutral-700/50">
                    <option value="all">All Categories</option>
                    <!-- Options injected via JS -->
                </select>
            </div>
        </div>

        <!-- Filter 2: Environment (Multi-Select) -->
        <div class="relative w-full md:w-64 group" id="env-multiselect-container">
            <button onclick="toggleEnvDropdown()" id="env-dropdown-btn"
                class="w-full pl-4 pr-10 py-2.5 bg-neutral-800 border border-neutral-700 rounded-lg text-neutral-200 text-sm focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-colors cursor-pointer hover:bg-neutral-700/50 text-left flex items-center justify-between">
                <span>All Environments</span>
                <i data-lucide="chevron-down" class="w-4 h-4 text-neutral-400"></i>
            </button>

            <!-- Dropdown Content -->
            <div id="env-dropdown-content"
                class="hidden absolute top-full left-0 w-full mt-2 bg-neutral-900 border border-neutral-700 rounded-xl shadow-xl z-50 overflow-hidden">
                <div class="p-2 border-b border-neutral-800 flex justify-between items-center bg-neutral-900/50">
                    <span class="text-xs font-mono text-neutral-500 uppercase tracking-wider">Select</span>
                    <button onclick="clearEnvSelection()" class="text-xs text-purple-400 hover:text-purple-300">Unselect
                        All</button>
                </div>
                <div id="env-checkbox-list" class="max-h-60 overflow-y-auto p-2 space-y-1">
                    <!-- Checkboxes injected via JS -->
                </div>
            </div>
        </div>

        <!-- Search & Count -->
        <div class="flex items-center gap-4 w-full md:w-auto">
            <div class="relative w-full md:w-64">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-neutral-500"></i>
                <input type="text" id="search-input" placeholder="Search projects..."
                    class="w-full pl-10 pr-4 py-2.5 bg-neutral-800 border border-neutral-700 rounded-lg text-neutral-200 text-sm focus:outline-none focus:border-purple-500 transition-colors placeholder-neutral-600">
            </div>
            <span class="text-neutral-500 text-sm font-mono whitespace-nowrap min-w-[100px] text-right"
                id="count-display">Loading...</span>
        </div>
    </div>

    <!-- MAIN GRID CONTAINER -->
    <div id="quest-grid"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-7xl mx-auto pb-12 transition-opacity duration-300">
        <!-- Cards injected here -->
    </div>

    <!-- Data Loader -->
    <script src="../../quests_data.js"></script>

    <!-- Modal (unchanged) -->
    <div id="modal"
        class="fixed inset-0 z-50 hidden modal-overlay flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-neutral-900 border border-neutral-700 rounded-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto relative shadow-2xl transform scale-95 transition-transform duration-300 scrollbar-hide"
            id="modal-content">
            <button onclick="closeModal()"
                class="absolute top-4 right-4 p-2 bg-neutral-800 rounded-full hover:bg-neutral-700 transition-colors z-20 group">
                <i data-lucide="x" class="w-6 h-6 text-neutral-400 group-hover:text-white"></i>
            </button>
            <div id="modal-body" class="p-8"></div>
        </div>
    </div>

    <script>
        // Icons
        lucide.createIcons();

        let searchQuery = '';
        // Multi-Select States
        let selectedEnvs = [];

        function init() {
            if (!window.quests) {
                console.error("No data found!");
                return;
            }

            // --- FILTER LOGIC 1 (THEMES - Single Select) ---
            const themeCounts = window.quests.reduce((acc, q) => {
                const theme = q.theme || 'Uncategorized';
                acc[theme] = (acc[theme] || 0) + 1;
                return acc;
            }, {});

            const uniqueThemes = Object.keys(themeCounts).sort();
            const select = document.getElementById('type-filter');
            uniqueThemes.forEach(theme => {
                const option = document.createElement('option');
                option.value = theme;
                option.innerText = `${theme} (${themeCounts[theme]})`;
                select.appendChild(option);
            });

            // --- FILTER LOGIC 2 (ENVIRONMENTS - Multi-Select) ---
            const envCounts = window.quests.reduce((acc, q) => {
                const env = q.environment || 'Unknown';
                acc[env] = (acc[env] || 0) + 1;
                return acc;
            }, {});

            const uniqueEnvs = Object.keys(envCounts).sort();
            const envList = document.getElementById('env-checkbox-list');

            uniqueEnvs.forEach(env => {
                // Checkbox Item
                const div = document.createElement('div');
                div.className = 'flex items-center gap-3 p-2 rounded hover:bg-neutral-800 cursor-pointer select-none transition-colors';
                div.onclick = (e) => {
                    e.preventDefault();
                    toggleEnvOption(env);
                };
                div.innerHTML = `
                    <div class="w-4 h-4 border border-neutral-600 rounded flex items-center justify-center transition-colors ${selectedEnvs.includes(env) ? 'bg-purple-500 border-purple-500' : ''}" id="cb-${env.replace(/\s+/g, '-')}-grid">
                        <i data-lucide="check" class="w-3 h-3 text-white ${selectedEnvs.includes(env) ? '' : 'hidden'}"></i>
                    </div>
                    <span class="text-sm text-neutral-300">${env}</span>
                    <span class="text-xs text-neutral-600 ml-auto font-mono">${envCounts[env]}</span>
                `;
                envList.appendChild(div);
            });

            // Listeners
            document.getElementById('search-input').addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase();
                renderQuests();
            });

            // Close dropdown when clicking outside
            document.addEventListener('click', (e) => {
                const container = document.getElementById('env-multiselect-container');
                const dropdown = document.getElementById('env-dropdown-content');
                if (container && dropdown && !container.contains(e.target)) {
                    dropdown.classList.add('hidden');
                }
            });

            renderQuests();
        }

        // --- SUB-FUNCTIONS FOR DROPDOWN ---
        function toggleEnvDropdown() {
            const dropdown = document.getElementById('env-dropdown-content');
            dropdown.classList.toggle('hidden');
            lucide.createIcons();
        }

        function toggleEnvOption(env) {
            if (selectedEnvs.includes(env)) {
                selectedEnvs = selectedEnvs.filter(e => e !== env);
            } else {
                selectedEnvs.push(env);
            }
            updateEnvDropdownUI();
            renderQuests();
        }

        function clearEnvSelection() {
            selectedEnvs = []; // Empty = All
            updateEnvDropdownUI();
            renderQuests();
        }

        function updateEnvDropdownUI() {
            // Update Button Text
            const btnSpace = document.querySelector('#env-dropdown-btn span');
            if (btnSpace) {
                if (selectedEnvs.length === 0) {
                    btnSpace.innerText = "All Environments";
                } else if (selectedEnvs.length === 1) {
                    btnSpace.innerText = selectedEnvs[0];
                } else {
                    btnSpace.innerText = `${selectedEnvs.length} Selected`;
                }
            }


            // Update Checkboxes Visuals
            const allCheckboxes = document.querySelectorAll('#env-checkbox-list > div');
            allCheckboxes.forEach(div => {
                const envNameSpan = div.querySelector('span.text-neutral-300');
                if (!envNameSpan) return; // Skip if element not found
                const envName = envNameSpan.innerText;
                const cbContainer = div.querySelector('div:first-child');
                const icon = cbContainer.querySelector('i');

                if (selectedEnvs.includes(envName)) {
                    cbContainer.classList.add('bg-purple-500', 'border-purple-500');
                    icon.classList.remove('hidden');
                } else {
                    cbContainer.classList.remove('bg-purple-500', 'border-purple-500');
                    icon.classList.add('hidden');
                }
            });
            lucide.createIcons();
        }


        // --- RENDER LOGIC ---
        function renderQuests() {
            const grid = document.getElementById('quest-grid');
            const data = window.quests || [];

            // Filter
            const typeFilter = document.getElementById('type-filter').value;

            const filtered = data.filter(q => {
                const matchesSearch = q.project.toLowerCase().includes(searchQuery) ||
                    q.theme.toLowerCase().includes(searchQuery);
                const matchesType = typeFilter === 'all' || q.theme === typeFilter;

                // Multi-select Logic: If selectedEnvs is empty -> Match All. Else -> Match Included
                const matchesEnv = selectedEnvs.length === 0 || selectedEnvs.includes(q.environment);

                return matchesSearch && matchesType && matchesEnv;
            });

            // Update Count
            document.getElementById('count-display').innerText = `${filtered.length} Quests`;

            grid.innerHTML = filtered.map(q => {
                // Fix Image Path for Sub-directory
                // If path starts with 'assets/', prepend '../../'
                const displayImage = (q.image && q.image.startsWith('assets/'))
                    ? '../../' + q.image
                    : q.image;

                return `
                <div class="card bg-neutral-900 border border-neutral-800 rounded-xl overflow-hidden group cursor-pointer h-full flex flex-col" onclick="openModal('${q.id}')">
                    <div class="h-48 overflow-hidden relative">
                         <!-- Image Fallback Logic -->
                        <div class="absolute inset-0 bg-neutral-800 animate-pulse" id="skel-${q.id}"></div>
                        <img src="${displayImage}" alt="${q.project}" 
                             class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 opacity-0"
                             onload="this.classList.remove('opacity-0'); document.getElementById('skel-${q.id}').style.display='none';">
                        
                        <div class="absolute top-3 right-3 flex gap-2">
                             <span class="px-2 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider bg-black/60 backdrop-blur-md text-white border border-white/10">
                                ${q.environment}
                            </span>
                        </div>
                    </div>
                    
                    <div class="p-6 flex flex-col flex-1">
                        <h3 class="text-xl font-bold text-white mb-2 group-hover:text-purple-400 transition-colors">${q.project}</h3>
                        <p class="text-neutral-400 text-sm mb-4 line-clamp-2">${q.description}</p>
                        
                        <div class="mt-auto pt-4 border-t border-neutral-800 flex items-center justify-between">
                            <span class="text-xs font-mono text-neutral-500">${q.date}</span>
                             <span class="text-xs px-2 py-1 rounded bg-neutral-800 text-neutral-300 border border-neutral-700">
                                ${q.theme}
                            </span>
                        </div>
                    </div>
                </div>
            `}).join('');

            lucide.createIcons();
        }

        // --- FILTER ---
        function filterQuests() {
            renderQuests();
        }

        // --- MODAL LOGIC ---
        function openModal(id) {
            const quest = window.quests.find(q => q.id === id);
            if (!quest) return;

            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-body');

            // Prevent body scroll
            document.body.style.overflow = 'hidden';

            // Fix Image Path for Modal
            const displayImage = (quest.image && quest.image.startsWith('assets/'))
                ? '../../' + quest.image
                : quest.image;

            content.innerHTML = `
                <div class="flex flex-col md:flex-row gap-8">
                    <div class="w-full md:w-1/2">
                        <img src="${displayImage}" class="w-full rounded-xl shadow-2xl border border-neutral-700 mb-6">
                        
                        <!-- Mini Stats Grid -->
                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <div class="bg-neutral-800/50 p-4 rounded-lg border border-neutral-700 text-center">
                                <span class="block text-xs text-neutral-500 uppercase tracking-widest mb-1">Activations</span>
                                <span class="text-xl font-bold text-white font-mono">${quest.activations}</span>
                            </div>
                            <div class="bg-neutral-800/50 p-4 rounded-lg border border-neutral-700 text-center">
                                <span class="block text-xs text-neutral-500 uppercase tracking-widest mb-1">Status</span>
                                <span class="text-xl font-bold text-green-400 font-mono">Live</span>
                            </div>
                        </div>

                        ${renderSidebarLinks(quest)}
                    </div>
                    
                    <div class="w-full md:w-1/2 space-y-6">
                        <div>
                            <h2 class="text-3xl font-bold text-white mb-2">${quest.project}</h2>
                            <div class="flex flex-wrap gap-2 mb-4">
                                <span class="px-3 py-1 bg-purple-500/10 text-purple-400 border border-purple-500/20 rounded-full text-xs font-bold uppercase tracking-wider">${quest.theme}</span>
                                <span class="px-3 py-1 bg-blue-500/10 text-blue-400 border border-blue-500/20 rounded-full text-xs font-bold uppercase tracking-wider">${quest.environment}</span>
                            </div>
                            <p class="text-neutral-300 leading-relaxed text-lg">${quest.description}</p>
                        </div>

                        <div class="space-y-4">
                            <h3 class="text-lg font-bold text-white flex items-center gap-2">
                                <i data-lucide="list-checks" class="text-green-400"></i> Quest Actions
                            </h3>
                            <ul class="space-y-3">
                                ${(quest.activities || []).map(t => `
                                    <li class="flex gap-3 items-start bg-neutral-800/30 p-3 rounded-lg border border-neutral-800">
                                        <i data-lucide="check-circle-2" class="w-5 h-5 text-neutral-500 shrink-0 mt-0.5"></i>
                                        <span class="text-neutral-300 text-sm">${t}</span>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    </div>
                </div>
            `;

            modal.classList.remove('hidden');
            // Trigger reflow
            void modal.offsetWidth;
            modal.classList.remove('opacity-0');

            // Scale up content
            document.getElementById('modal-content').classList.remove('scale-95');
            document.getElementById('modal-content').classList.add('scale-100');

            lucide.createIcons();
        }

        function renderSidebarLinks(quest) {
            let html = '<div class="space-y-3">';

            if (quest.url) {
                html += `
                    <a href="${quest.url}" target="_blank" 
                       class="flex items-center justify-between p-4 bg-neutral-800 hover:bg-neutral-700 border border-neutral-700 rounded-xl transition-all group">
                        <span class="font-bold text-white group-hover:text-blue-400 transition-colors">Visit Project</span>
                        <i data-lucide="external-link" class="w-5 h-5 text-neutral-500 group-hover:text-white"></i>
                    </a>
                `;
            }

            // Add Socials if specific ones existed in data (mocking generic logic here or could expand data structure)
            html += `
                <div class="flex gap-2 justify-center pt-4">
                     ${renderSocialButton('twitter', '#')}
                     ${renderSocialButton('globe', '#')}
                     ${renderSocialButton('discord', '#')}
                </div>
            `;

            html += '</div>';
            return html;
        }

        function renderSocialButton(icon, link) {
            return `
                <a href="${link}" class="p-2 bg-neutral-800 rounded-lg hover:bg-neutral-700 text-neutral-400 hover:text-white transition-colors">
                    <i data-lucide="${icon}" class="w-5 h-5"></i>
                </a>
            `;
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.add('opacity-0');
            document.getElementById('modal-content').classList.remove('scale-100');
            document.getElementById('modal-content').classList.add('scale-95');

            setTimeout(() => {
                modal.classList.add('hidden');
                document.body.style.overflow = '';
            }, 300);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
