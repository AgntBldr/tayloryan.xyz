<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testimonials | Taylor Ryan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../assets/js/testimonials_data.js"></script>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }

        .gradient-text {
            background: linear-gradient(to right, #a855f7, #ec4899, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Masonry Layout */
        .masonry-grid {
            column-count: 1;
            column-gap: 1.5rem;
        }

        @media (min-width: 768px) {
            .masonry-grid {
                column-count: 2;
            }
        }

        @media (min-width: 1024px) {
            .masonry-grid {
                column-count: 3;
            }
        }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: 1.5rem;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>

<body class="min-h-screen relative overflow-x-hidden">
    <!-- Global Layout -->
    <script src="../assets/js/layout.js?v=20260128-0740"></script>
    <script src="../assets/js/work_sidebar.js?v=20260128-0740"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof renderAboutSidebar === 'function') renderAboutSidebar('testimonials');
        });
    </script>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-6 py-24 relative z-10 md:pl-72">

        <!-- Header Section -->
        <div class="text-center mb-16">
            <div
                class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-purple-500/10 border border-purple-500/20 text-purple-400 text-xs font-bold uppercase tracking-wider mb-6">
                <i data-lucide="message-circle" class="w-4 h-4"></i> Testimonials
            </div>

            <h1 class="text-5xl md:text-7xl font-bold mb-6 tracking-tight">
                What People <span class="gradient-text">Say</span>
            </h1>

            <p class="text-xl text-neutral-400 max-w-2xl mx-auto leading-relaxed">
                Feedback from event organizers, attendees, and founders.
            </p>
        </div>

        <!-- Resource Links -->
        <div class="flex flex-wrap justify-center gap-4 mb-16 px-4">
            <a href="https://docs.google.com/presentation/d/1BCEpcNoAGty315czQ4bauJ8GBeWCbvtONlCdQ7O2twY/edit?usp=sharing"
                target="_blank"
                class="px-6 py-3 bg-neutral-900 border border-neutral-700 hover:border-yellow-500/50 rounded-full text-white font-medium transition-all flex items-center gap-2 group hover:-translate-y-0.5 shadow-lg shadow-black/20">
                <i data-lucide="star" class="w-4 h-4 text-yellow-500 group-hover:scale-110 transition-transform"></i>
                <span class="whitespace-nowrap">70+ Page Testimonials Deck</span>
            </a>
            <a href="work_speaker_topics.html"
                class="px-6 py-3 bg-neutral-900 border border-neutral-700 hover:border-blue-500/50 rounded-full text-white font-medium transition-all flex items-center gap-2 group hover:-translate-y-0.5 shadow-lg shadow-black/20">
                <i data-lucide="mic-2" class="w-4 h-4 text-blue-500 group-hover:scale-110 transition-transform"></i>
                <span class="whitespace-nowrap">Speaker Topics</span>
            </a>
            <a href="work_speaker.html#engagements"
                class="px-6 py-3 bg-neutral-900 border border-neutral-700 hover:border-purple-500/50 rounded-full text-white font-medium transition-all flex items-center gap-2 group hover:-translate-y-0.5 shadow-lg shadow-black/20">
                <i data-lucide="map-pin" class="w-4 h-4 text-purple-500 group-hover:scale-110 transition-transform"></i>
                <span class="whitespace-nowrap">Past Engagements</span>
            </a>
        </div>

        <!-- Filters (Optional - can extend later if needed) -->
        <!-- <div class="flex justify-center gap-4 mb-12">
            <button class="px-4 py-2 rounded-full bg-white text-black font-bold text-sm">All</button>
            <button class="px-4 py-2 rounded-full bg-neutral-900 border border-neutral-800 text-neutral-400 hover:text-white transition-colors text-sm">Keynotes</button>
            <button class="px-4 py-2 rounded-full bg-neutral-900 border border-neutral-800 text-neutral-400 hover:text-white transition-colors text-sm">Workshops</button>
        </div> -->

        <!-- Testimonials Grid -->
        <div id="testimonials-grid" class="masonry-grid min-h-[400px]">
            <!-- Populated via JS -->
            <div class="text-center py-20 col-span-full">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-purple-500 mx-auto mb-4"></div>
                <p class="text-neutral-500">Loading testimonials...</p>
            </div>
        </div>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Wait briefly for data to ensure load
            setTimeout(renderTestimonials, 100);
        });

        function renderTestimonials() {
            if (typeof TESTIMONIALS_DATA === 'undefined') {
                console.error("No Data Found");
                document.getElementById('testimonials-grid').innerHTML = '<div class="text-center text-neutral-500 py-10">No data available. Please check assets/js/testimonials_data.js</div>';
                return;
            }

            const container = document.getElementById('testimonials-grid');
            container.innerHTML = '';

            TESTIMONIALS_DATA.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = "masonry-item mx-auto w-full bg-neutral-900 border border-neutral-800 rounded-2xl p-6 hover:border-purple-500/30 transition-colors animate-fade-in group";
                card.style.animationDelay = `${index * 50}ms`;

                // Initials for avatar
                const initials = item.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();

                // Random gradient for avatar
                const gradients = [
                    'from-purple-500 to-indigo-500',
                    'from-pink-500 to-rose-500',
                    'from-blue-500 to-cyan-500',
                    'from-emerald-500 to-teal-500',
                    'from-orange-500 to-amber-500'
                ];
                const randomGradient = gradients[index % gradients.length];

                card.innerHTML = `
                    <div class="mb-4 text-purple-500 opacity-50">
                        <i data-lucide="quote" class="w-8 h-8 fill-current"></i>
                    </div>
                    
                    <p class="text-neutral-300 leading-relaxed text-lg mb-6 italic">"${item.quote}"</p>
                    
                    <div class="flex items-center gap-3 pt-4 border-t border-neutral-800">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-br ${randomGradient} flex items-center justify-center text-white font-bold text-xs shadow-lg">
                            ${initials}
                        </div>
                        <div>
                            <h4 class="font-bold text-white text-sm">${item.name}</h4>
                            <div class="flex flex-col">
                                ${item.role ? `<span class="text-xs text-neutral-400">${item.role}</span>` : ''}
                                ${item.company ? `<span class="text-xs text-purple-400">${item.company}</span>` : ''}
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            lucide.createIcons();
        }
    </script>
</body>

</html>
