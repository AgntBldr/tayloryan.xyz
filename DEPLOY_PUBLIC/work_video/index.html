<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Work | Taylor Ryan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="../assets/js/video_work_data.js"></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #000;
            color: #fff;
        }

        /* Modal Styles */
        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-black min-h-screen">
    <script src="../assets/js/layout.js?v=20260203-0901"></script>
    <script src="../assets/js/work_sidebar.js?v=20260203-0901"></script>
    <script src="../assets/js/work_scroll.js?v=20260203-0901"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!document.getElementById('work-sidebar')) {
                if (typeof renderWorkSidebar === 'function') renderWorkSidebar('video');
            }
        });
    </script>

    <main class="pt-32 pb-20 max-w-7xl mx-auto px-6 md:pl-72 transition-all">
        <!-- Header -->
        <div class="mb-16">
            <span class="text-red-500 font-bold tracking-widest uppercase text-sm mb-4 block">Work Portfolio</span>
            <h1 class="text-5xl md:text-7xl font-extrabold text-white mb-6">Video Work</h1>
            <p class="text-neutral-400 text-xl max-w-3xl leading-relaxed">
                A collection of video content, interviews, and workshops.
            </p>
        </div>

        <!-- Grid -->
        <div id="tutorials-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Injected via JS -->
            <div class="text-center py-20 col-span-full">
                <i data-lucide="loader" class="w-8 h-8 text-red-500 animate-spin mx-auto mb-4"></i>
                <p class="text-neutral-500">Loading videos...</p>
            </div>
        </div>

    </main>

    <!-- Modal -->
    <div id="resource-modal" onclick="closeModal()"
        class="fixed inset-0 z-50 hidden modal-overlay flex items-center justify-center p-4">
        <div onclick="event.stopPropagation()"
            class="bg-neutral-900 border border-neutral-700 rounded-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto relative shadow-2xl scale-95 transition-transform duration-200"
            id="modal-content">
            <button onclick="closeModal()"
                class="absolute top-4 right-4 p-2 bg-neutral-800 rounded-full hover:bg-neutral-700 transition-colors z-20"><i
                    data-lucide="x" class="w-5 h-5 text-white"></i></button>

            <div class="p-8 md:p-12">
                <h2 id="modal-title" class="text-2xl md:text-3xl font-bold text-white mb-4">Title</h2>
                <div id="modal-description" class="text-neutral-300 text-lg leading-relaxed mb-6 whitespace-pre-wrap">
                </div>

                <!-- Video Embed Container -->
                <div id="modal-video-container"
                    class="aspect-video bg-black rounded-xl overflow-hidden mb-6 border border-neutral-800">
                    <!-- Iframe injected here -->
                </div>

                <div class="flex justify-between items-center">
                    <span id="modal-category"
                        class="px-3 py-1 bg-red-500/10 text-red-500 rounded-full text-xs font-bold uppercase tracking-wider">Video</span>
                    <a id="modal-link" href="#" target="_blank"
                        class="flex items-center gap-2 text-white hover:text-red-400 transition-colors font-bold">Watch
                        on YouTube <i data-lucide="external-link" class="w-4 h-4"></i></a>
                </div>
            </div>
        </div>
    </div>


    <script>
        let searchQuery = '';
        let activeFilter = 'All';

        document.addEventListener('DOMContentLoaded', () => {
            // Wait briefly for data if needed, or checking variable
            setTimeout(() => {
                if (typeof VIDEO_WORK_DATA === 'undefined') {
                    document.getElementById('tutorials-grid').innerHTML = '<p class="text-neutral-500 col-span-full text-center">No data found.</p>';
                    return;
                }
                renderVideos();
                lucide.createIcons();
            }, 100);
        });

        function renderVideos() {
            const container = document.getElementById('tutorials-grid');
            let data = VIDEO_WORK_DATA;

            // 1. Filter Logic
            if (activeFilter !== 'All') {
                data = data.filter(item => item.category === activeFilter);
            }

            if (searchQuery) {
                const lowerQuery = searchQuery.toLowerCase();
                data = data.filter(item =>
                    item.title.toLowerCase().includes(lowerQuery) ||
                    (item.description && item.description.toLowerCase().includes(lowerQuery))
                );
            }

            // Categories
            const allCategories = ['All', ...new Set(VIDEO_WORK_DATA.map(i => i.category || 'Video').filter(c => c))];

            let html = `
                <!-- Search & Filters -->
                <div class="col-span-full flex flex-col gap-6 mb-12">
                    <!-- Search Bar -->
                    <div class="flex flex-col md:flex-row gap-4 bg-neutral-900/50 p-4 rounded-2xl border border-white/5 items-center">
                        <div class="relative flex-1 w-full">
                            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-neutral-500"></i>
                            <input type="text" placeholder="Search videos..." value="${searchQuery}" 
                                oninput="searchQuery = this.value; renderVideos()"
                                class="w-full bg-neutral-900 border border-white/10 rounded-xl text-white px-12 py-3 focus:ring-2 focus:ring-red-500/50 focus:border-red-500/50 focus:outline-none transition-all placeholder:text-neutral-600">
                        </div>
                        <div class="px-4 py-3 bg-red-500/10 rounded-xl border border-red-500/20 text-red-500 text-sm font-bold whitespace-nowrap">
                            ${data.length} Videos
                        </div>
                    </div>

                    <!-- Category Filters -->
                    <div class="flex flex-wrap gap-2">
                         ${allCategories.map(cat => `
                            <button onclick="activeFilter = '${cat.replace(/'/g, "\\'")}'; renderVideos()" 
                                class="px-4 py-2 rounded-full text-xs font-bold uppercase tracking-wider border transition-all ${activeFilter === cat ? 'bg-red-500 text-white border-red-500' : 'bg-neutral-900 text-neutral-400 border-neutral-700 hover:border-neutral-500 hover:text-white'}">
                                ${cat}
                            </button>
                         `).join('')}
                    </div>
                </div>
            `;

            if (data.length === 0) {
                html += `
                    <p class="text-neutral-500 col-span-full text-center py-20">No videos found.</p>
                `;
                container.innerHTML = html;
                lucide.createIcons();
                return;
            }

            html += data.map(item => {
                const safeTitle = item.title.replace(/'/g, "\\'");
                // Use description as the main card title, truncated
                const rawDesc = item.description || '';
                const truncatedDesc = rawDesc.length > 80 ? rawDesc.substring(0, 80) + '...' : rawDesc;
                const safeDescTitle = truncatedDesc.replace(/'/g, "\\'");
                const fullDesc = rawDesc.replace(/'/g, "\\'");

                // Prepare modal args
                const modalArgs = [
                    safeTitle,           // original title (e.g. Type)
                    item.videoId,
                    item.url,
                    fullDesc,            // full description
                    item.industry ? item.industry.replace(/'/g, "\\'") : '',
                    item.tags ? JSON.stringify(item.tags).replace(/'/g, "\\'").replace(/"/g, "&quot;") : '[]'
                ];

                return `
                <div onclick="openModal('${modalArgs[0]}', '${modalArgs[1]}', '${modalArgs[2]}', '${modalArgs[3]}', '${modalArgs[4]}', '${modalArgs[5]}')" class="group flex flex-col bg-neutral-900 border border-neutral-800 hover:border-red-500/50 rounded-2xl overflow-hidden transition-all hover:-translate-y-1 cursor-pointer">
                    
                    <!-- Video Thumbnail -->
                    <div class="h-48 bg-neutral-800 flex items-center justify-center relative overflow-hidden group-hover:opacity-90 transition-opacity">
                         <i data-lucide="play-circle" class="w-16 h-16 text-neutral-700/50 group-hover:text-red-500 transition-colors z-10 shadow-xl"></i>
                         <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
                         
                         ${item.videoId ?
                        `<img src="https://img.youtube.com/vi/${item.videoId}/hqdefault.jpg" class="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:opacity-80 transition-opacity" />`
                        : ''}
                    </div>

                    <div class="p-6 flex-1 flex flex-col">
                        <div class="flex justify-between items-start mb-3">
                             <span class="text-xs font-bold text-red-400 uppercase tracking-wider border border-red-500/20 px-2 py-1 rounded bg-red-500/5">${item.category || 'Video'}</span>
                        </div>
                        
                        <!-- Main Card Title becomes the Description -->
                        <h3 class="text-xl font-bold text-white mb-3 group-hover:text-red-500 transition-colors line-clamp-3 min-h-[4.5rem]">${truncatedDesc}</h3>
                        
                        <div class="mt-auto pt-4 border-t border-neutral-800 flex items-center justify-between text-sm text-neutral-500 group-hover:text-white transition-colors">
                            <span>View Details</span>
                            
                            <!-- External Watch Link (Stops Propagation) -->
                            <a href="${item.url}" target="_blank" onclick="event.stopPropagation()" class="flex items-center gap-1 text-red-400 hover:text-white transition-colors text-xs font-bold uppercase tracking-wider">
                                Watch <i data-lucide="external-link" class="w-3 h-3"></i>
                            </a>
                        </div>
                    </div>
                </div>
                `;
            }).join('');

            container.innerHTML = html;
            lucide.createIcons();
        }

        function openModal(originalTitle, videoId, url, description, industry, tagsStr) {
            // Parse tags safely
            let tags = [];
            try {
                tags = JSON.parse(tagsStr.replace(/&quot;/g, '"'));
            } catch (e) { console.error("Tag parse error", e); }

            // Title Logic: The user wants "Type" as the type, but let's stick to what we have.
            // If we used Description as Card Title, let's allow the Modal Title to be the Full Description 
            // OR keep the Original Title (e.g. "Learning Lessons") as a subdued label.

            // Current approach: Set Modal Title to Description for consistency, 
            // and use Original Title as a 'Type' badge next to Category?

            // Let's set Modal Title to the Full Description to match the card click expectation.
            document.getElementById('modal-title').textContent = description || originalTitle;

            // Clear description if it's now the title? Or keep it? 
            // If the description is long, we might want it in the body.
            // But if we put it as title, it might be huge.
            // COMPROMISE: Title = Original Title (Type), Description = Full Description. 
            // Wait, User said: "I want the titles instead of the type of video listed in the cards"
            // So on the CARD, we show Description.
            // On the MODAL, we probably want the Full Description as the main text.

            // Let's stick to the prompt: "Put more information in the modal window"
            document.getElementById('modal-title').textContent = originalTitle; // Keep "Learning Lessons" as header? 
            // No, that's what they wanted to avoid on cards. 
            // Let's flip it: Modal Title = Description (truncated if super long?), Body = Detail?

            // Actually, let's rely on visual hierarchy.
            // I'll make the Modal Title the Description (since that's the "Name" of this content effectually).
            document.getElementById('modal-title').textContent = description;

            // Description body can be empty if it's identical to title, or we can use it for something else.
            // Since we don't have a *separate* description field (we just have one), 
            // we'll leave the description body empty or use it for the "Type" info.

            let extraInfoHtml = '';

            // Industry
            if (industry) {
                extraInfoHtml += `
                    <div class="mb-4">
                        <span class="text-neutral-500 text-sm uppercase tracking-wider font-bold block mb-1">Industry / Context</span>
                        <p class="text-neutral-300">${industry}</p>
                    </div>
                `;
            }

            // Tags
            if (tags && tags.length > 0) {
                extraInfoHtml += `
                    <div class="mb-4">
                        <span class="text-neutral-500 text-sm uppercase tracking-wider font-bold block mb-2">Tags</span>
                        <div class="flex flex-wrap gap-2">
                            ${tags.map(t => `<span class="px-2 py-1 bg-neutral-800 text-neutral-300 text-sm rounded-md border border-neutral-700">${t}</span>`).join('')}
                        </div>
                    </div>
                `;
            }

            // Type/Category info
            extraInfoHtml += `
                 <div class="mb-4 pt-4 border-t border-neutral-800">
                    <span class="text-neutral-500 text-sm">Type: <span class="text-white">${originalTitle}</span></span>
                 </div>
            `;

            document.getElementById('modal-description').innerHTML = extraInfoHtml;

            document.getElementById('modal-link').href = url;
            document.getElementById('modal-category').textContent = "Video"; // or use active category

            const container = document.getElementById('modal-video-container');
            if (videoId && videoId !== 'undefined' && videoId !== 'null') {
                container.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${videoId}?autoplay=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
            } else {
                container.innerHTML = `<div class="w-full h-full flex items-center justify-center text-neutral-500">Video embedding not available. <a href="${url}" target="_blank" class="ml-2 underline text-red-400">Click to watch</a></div>`;
            }

            const modal = document.getElementById('resource-modal');
            const content = document.getElementById('modal-content');
            modal.classList.remove('hidden');
            void modal.offsetWidth;
            content.classList.remove('scale-95');
            content.classList.add('scale-100');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('resource-modal');
            const content = document.getElementById('modal-content');

            const videoContainer = document.getElementById('modal-video-container');
            if (videoContainer) videoContainer.innerHTML = '';

            content.classList.remove('scale-100');
            content.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                document.body.style.overflow = '';
            }, 200);
        }
    </script>
</body>

</html>
